function getDayType(dateStr, customVacations, bzList, hiddenHols) {
  const date = new Date(dateStr + "T12:00:00");
  const dow = date.getDay();
  if (dow === 6) return { type:"shabbat",      label:"שבת" };
  if (dow === 5) return { type:"friday",       label:"שישי" };
  if (customVacations?.[dateStr]) return { type:"vacation", label:customVacations[dateStr] };
  for (const bh of (bzList||BEIN_HAZMANIM)) {
    if (dateStr >= bh.from && dateStr <= bh.to) return { type:"bein_hazmanim", label:bh.label };
  }
  for (const h of HOLIDAYS_DB) {
    if (hiddenHols?.includes(h.label)) continue;
    if (h.date === dateStr) return { type:"holiday", label:h.label };
    if (h.from && dateStr >= h.from && dateStr <= h.to) return { type:"holiday", label:h.label };
  }
  return { type:"learning", label:"" };
}

function getMonthWeeks(year, month) {
  const weeks = [];
  const lastDay = new Date(year, month + 1, 0);
  let current = new Date(year, month, 1);
  while (current.getDay() !== 0) current.setDate(current.getDate() - 1);
  while (current <= lastDay) {
    const week = [];
    for (let d = 0; d < 5; d++) {
      const y=current.getFullYear(), mo=current.getMonth(), da=current.getDate();
      const dateStr=`${y}-${String(mo+1).padStart(2,"0")}-${String(da).padStart(2,"0")}`;
      week.push({ dateStr, dayNum:da, inMonth:mo===month });
      current.setDate(current.getDate() + 1);
    }
    current.setDate(current.getDate() + 2); // skip Fri+Sat
    if (week.some(d => d.inMonth)) weeks.push(week);
  }
  return weeks;
}

const _hDayNumFmt= new Intl.DateTimeFormat("en-u-ca-hebrew",  { day:"numeric" }); // returns Arabic numeral

const HEB_LETTERS = ["","א","ב","ג","ד","ה","ו","ז","ח","ט","י","יא","יב","יג","יד","טו","טז","יז","יח","יט","כ","כא","כב","כג","כד","כה","כו","כז","כח","כט","ל"];

// המרת תאריך עברי → גרגוריאני (מחושב דינמית מהלוח העברי של הדפדפן - תקין לכל שנה)
const HEB_MONTHS = ["תשרי","חשון","כסלו","טבת","שבט","אדר","ניסן","אייר","סיון","תמוז","אב","אלול"];
const HEB_MONTH_EN = { "תשרי":"Tishri","חשון":"Heshvan","כסלו":"Kislev","טבת":"Tevet","שבט":"Shevat","אדר":"Adar","ניסן":"Nisan","אייר":"Iyar","סיון":"Sivan","תמוז":"Tamuz","אב":"Av","אלול":"Elul" };
const _hebFmt = new Intl.DateTimeFormat("en-US-u-ca-hebrew", { year:"numeric", month:"short", day:"numeric" });
const _hebMonthStartCache = {};
function _scanHebYear(hebYear){
  const gy = hebYear - 3761; // שנה עברית X מתחילה בערך בספטמבר-אוקטובר של (X-3760)
  let d = new Date(Date.UTC(gy, 7, 1));
  const end = new Date(Date.UTC(gy+1, 10, 15));
  while(d<=end){
    const parts=_hebFmt.formatToParts(d);
    const mEn=parts.find(p=>p.type==="month").value;
    const day=Number(parts.find(p=>p.type==="day").value);
    const yr=Number(parts.find(p=>p.type==="year").value);
    if(yr===hebYear && day===1){
      const ds=`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
      _hebMonthStartCache[hebYear+"|"+mEn]=ds;
    }
    d.setUTCDate(d.getUTCDate()+1);
  }
}
function _hebMonthStart(hebYear, monthHeb){
  if(!_hebMonthStartCache[hebYear+"|Tishri"]) _scanHebYear(hebYear);
  let monthEn = HEB_MONTH_EN[monthHeb];
  // שנה מעוברת: "אדר" מתייחס לאדר ב׳ (האדר הסמוך לניסן)
  if(monthEn==="Adar" && _hebMonthStartCache[hebYear+"|Adar II"]) monthEn="Adar II";
  return _hebMonthStartCache[hebYear+"|"+monthEn]||null;
}
const hebToGreg = (year, month, day) => {
  const start = _hebMonthStart(year, month);
  if(!start) return null;
  const d = new Date(start+"T12:00:00");
  d.setDate(d.getDate()+day-1);
  const y=d.getFullYear(), m=d.getMonth()+1, da=d.getDate();
  return `${y}-${String(m).padStart(2,"0")}-${String(da).padStart(2,"0")}`;
};
// אורך חודש עברי בפועל (יכול להשתנות משנה לשנה)
const hebMonthDays = (year, month) => {
  const idx = HEB_MONTHS.indexOf(month);
  const cur = hebToGreg(year, month, 1);
  const next = idx<HEB_MONTHS.length-1 ? hebToGreg(year, HEB_MONTHS[idx+1], 1) : hebToGreg(year+1, HEB_MONTHS[0], 1);
  if(!cur||!next) return 29;
  const diff = Math.round((new Date(next+"T12:00:00") - new Date(cur+"T12:00:00"))/86400000);
  return diff>0?diff:29;
};
// המרת שנה עברית למספר בגימטריה, לדוגמה 5786 → תשפ״ו
const _GEMATRIA=[[400,"ת"],[300,"ש"],[200,"ר"],[100,"ק"],[90,"צ"],[80,"פ"],[70,"ע"],[60,"ס"],[50,"נ"],[40,"מ"],[30,"ל"],[20,"כ"],[10,"י"],[9,"ט"],[8,"ח"],[7,"ז"],[6,"ו"],[5,"ה"],[4,"ד"],[3,"ג"],[2,"ב"],[1,"א"]];
function hebYearLabel(y){
  const n=y%1000, letters=[];
  let h=Math.floor(n/100)*100, rest=n%100;
  for(const [v,l] of _GEMATRIA){ if(v>=100){ while(h>=v){letters.push(l);h-=v;} } }
  if(rest===15) letters.push("ט","ו");
  else if(rest===16) letters.push("ט","ז");
  else { let r=rest; for(const [v,l] of _GEMATRIA){ if(v<100){ while(r>=v){letters.push(l);r-=v;} } } }
  if(letters.length<=1) return (letters[0]||"")+"׳";
  return letters.slice(0,-1).join("")+"״"+letters[letters.length-1];
}
// טווח שנים עבריות פעיל (מתעדכן אוטומטית מדי שנה לפי התאריך הנוכחי)
const _curHebYear = Number((new Intl.DateTimeFormat("en-US-u-ca-hebrew",{year:"numeric"}).format(new Date()).match(/\d+/)||[])[0]) || 5786;
const HEB_YEARS = Array.from({length:5},(_,i)=>_curHebYear-1+i);

    const cur=local.current.customVacations||{};
    const upd={...cur,[dateStr]:label};
    local.current.customVacations=upd; setCustomVacS(upd); sync(()=>fbSet("customVacations",upd));
  };
  const removeCustomVacation = (dateStr) => {
    const cur={...(local.current.customVacations||{})};
    delete cur[dateStr];
    local.current.customVacations=cur; setCustomVacS(cur); sync(()=>fbSet("customVacations",cur));
  };
  const addBeinHazmanim = entry => {
    const cur=[...(local.current.beinHazmanims||BEIN_HAZMANIM)];
    const upd=[...cur,entry].sort((a,b)=>a.from.localeCompare(b.from));
    local.current.beinHazmanims=upd; setBeinHazmanims(upd); sync(()=>fbSet("beinHazmanims",upd));
  };
  const removeBeinHazmanim = idx => {
    const cur=[...(local.current.beinHazmanims||BEIN_HAZMANIM)];
    const upd=cur.filter((_,i)=>i!==idx);
    local.current.beinHazmanims=upd; setBeinHazmanims(upd); sync(()=>fbSet("beinHazmanims",upd));
  };
  const toggleHolidayHidden = label => {
    const cur=local.current.hiddenHols||[];
    const upd=cur.includes(label)?cur.filter(l=>l!==label):[...cur,label];
    local.current.hiddenHols=upd; setHiddenHols(upd); sync(()=>fbSet("hiddenHols",upd));
  };
  const setRpAvrechim = fn => {
    const n=typeof fn==="function"?fn(local.current.rpAvrechim||[]):fn;
    local.current.rpAvrechim=n; setRpAvrechimS(n); sync(()=>fbSet("ravPinchas/avrechim",n));
  };
  const setRpBaseBalance = v => {
    local.current.rpBaseBalance=v; setRpBaseBS(v); sync(()=>fbSet("ravPinchas/baseBalance",v));
  };
  const setRpContact = v => {
    local.current.rpContact=v; setRpContactS(v); sync(()=>fbSet("ravPinchas/contact",v));
  };
  const setRpMonthField = (monthKey,field,val) => {
    const cur=local.current.rpMonths||{};
    const upd={...cur,[monthKey]:{...(cur[monthKey]||{}),[field]:val}};
    local.current.rpMonths=upd; setRpMonthsS(upd); sync(()=>fbSet("ravPinchas/months",upd));
  };
  const updateBeinHazmanim = (idx, entry) => {
    const cur=[...(local.current.beinHazmanims||BEIN_HAZMANIM)];
    cur[idx]=entry;
    const upd=[...cur].sort((a,b)=>a.from.localeCompare(b.from));
    local.current.beinHazmanims=upd; setBeinHazmanims(upd); sync(()=>fbSet("beinHazmanims",upd));
  };

  const getMD = (key,field,def=0) => allMonths[key]?.[field] ?? def;
  const getAV = (monthKey,avId,field,def="") => avAllMonths[monthKey]?.[avId]?.[field] ?? def;

  // ── MONTH CALCULATIONS ──
  // Calculate per-avrech for a given month, carrying gap from previous month
  const calcAvrechMonth = (av, monthKey, prevMonthKey) => {
    const monthly  = Number(getAV(monthKey,av.id,"monthlyStipend"))||0;
    const exams    = Number(getAV(monthKey,av.id,"exams"))||0;
    // תמיכה בפורמט ישן: track:"keren" → incomeGroup:"keren", trackNum:1000
    const incomeGroup = av.incomeGroup || (av.track==="keren" ? "keren" : "datot");
    const trackNum = (av.track==="keren") ? 1000 : (Number(av.track)||1000);

    // חלוקת דתות/קרן אוטומטית לפי קבוצה
    const datotCount = avrechim.filter(a=>a.active && (a.incomeGroup||( a.track==="keren"?"keren":"datot"))==="datot").length;
    const kerenCount = avrechim.filter(a=>a.active && (a.incomeGroup||(a.track==="keren"?"keren":"datot"))==="keren").length;
    const totalDatot = Number(getMD(monthKey,"datot"))||0;
    const totalKeren = Number(getMD(monthKey,"keren"))||0;
    const autoDatot  = (incomeGroup==="datot" && datotCount>0) ? totalDatot/datotCount : 0;
    const autoKeren  = (incomeGroup==="keren" && kerenCount>0) ? totalKeren/kerenCount : 0;

    // ערך ידני עוקף אוטומטי (אם הוזן)
    const datotRaw = getAV(monthKey,av.id,"datot");
    const kerenRaw = getAV(monthKey,av.id,"keren");
    const datot = datotRaw!==""?Number(datotRaw):autoDatot;
    const keren = kerenRaw!==""?Number(kerenRaw):autoKeren;

    // כמה הכניס סריקוב בפועל לאברך (ברירת מחדל: לפי המסלול)
    const sarikowGivenRaw = getAV(monthKey,av.id,"sarikowGiven");
    const sarikowGiven = sarikowGivenRaw!==""?Number(sarikowGivenRaw):trackNum;
    // עיגול אוטומטי: מה שסריקוב הכניס בפועל − דתות − קרן (לא המסלול הקבוע — כדי לשקף מה שבאמת ניתן החודש)
    const rounding = Math.max(0, sarikowGiven - datot - keren);
    // מה מתוך מה שסריקוב הכניס מקורו בקופה (אחרי קיזוז דתות/קרן)
    const kupaPortion = sarikowGiven - datot - keren;
    // בנק בסיסי: מגיע לו − מה שמקורו בקופה + בחינות
    const prevRefundCarryover = prevMonthKey ? Number(getAV(prevMonthKey,av.id,"refundCarryover")||0) : 0;
    const bank = monthly - kupaPortion + exams + prevRefundCarryover;
    // אין העברת פערים לחודש הבא — כל חודש עומד בפני עצמו
    const prevBankGap = 0;
    const effectiveBank = bank;

    // תענית דיבור — מזומן נפרד, 15 ₪ ליום (מחושב כאן כי נחוץ להתחשבנות)
    // מוצג תמיד ב"מגיע לו סה״כ" בלשונית חשבון, בלי תלות בסימון "קיבל" בלשונית בנק (זה מעקב תשלום מזומן נפרד)
    const taanitDays   = Number(getAV(monthKey,av.id,"taanitDays"))||0;
    const taanitAmount = taanitDays * 15;
    const taanitOwed   = taanitAmount;

    // ── חישוב יתרה לחשבון ──
    // מה מגיע לאברך מהקופה עצמה בלבד — לא כולל את חלק הדתות/קרן (זה כסף חיצוני שעובר דרך סריקוב, לא מקזז מהמחויבות של הקופה)
    const externalPerAvrech = autoDatot + autoKeren;
    const totalReceived = kupaPortion;
    // סה״כ מגיע לאברך (מגיע לו + בחינות + תענית דיבור שטרם שולמה)
    const totalOwedToAv = monthly + exams + taanitOwed;
    // יתרה: חיובי = סריקוב חייב לאברך | שלילי = אברך חייב לסריקוב
    const prevSettlementCarryover = prevMonthKey ? Number(getAV(prevMonthKey,av.id,"settlementCarryover")||0) : 0;
    const settlementBalance = (totalOwedToAv > 0 ? totalOwedToAv - totalReceived : 0) + prevSettlementCarryover;
    // מה הוכנס בפועל לבנק
    const actualBankRaw = getAV(monthKey,av.id,"actualBank");
    const actualBank = actualBankRaw!==""?Number(actualBankRaw):null;
    // בונוסים שאינם מצטברים לחודש הבא
    const holiday = Number(getAV(monthKey,av.id,"holiday"))||0;
    const depositRounding = Number(getAV(monthKey,av.id,"depositRounding"))||0;
    const totalToBank = effectiveBank + holiday + depositRounding;
    // פיצול בנק/מזומן — ברירת מחדל: כל הסכום לבנק
    const bankDepositRaw = getAV(monthKey,av.id,"bankDeposit");
    const bankDeposit = bankDepositRaw!==""?Number(bankDepositRaw):totalToBank;
    const cashAmount = Math.max(0, totalToBank - bankDeposit);
    // פער לחודש הבא — ברירת מחדל: מניחים שהופקד bankDeposit + מזומן = totalToBank
    const actualBankForGap = actualBank!==null ? actualBank : (totalToBank>0 ? bankDeposit : null);
    const bankGapRaw = getAV(monthKey,av.id,"bankGap");
    const bankGapAuto = actualBankForGap!==null ? effectiveBank - (actualBankForGap + cashAmount - holiday - depositRounding) : 0;
    const bankGap = bankGapRaw!==""?Number(bankGapRaw):bankGapAuto;

    return { monthly, datot, keren, autoDatot, autoKeren, datotRaw, kerenRaw, rounding, sarikowGivenRaw, sarikowGiven, kupaPortion, exams, bank, prevBankGap, effectiveBank, actualBank, holiday, depositRounding, totalToBank, bankDeposit, cashAmount, bankGapAuto, bankGap, trackNum, datotCount, kerenCount, incomeGroup, totalDatot, totalKeren, taanitDays, taanitAmount, taanitOwed, externalPerAvrech, totalReceived, totalOwedToAv, settlementBalance, prevSettlementCarryover, prevRefundCarryover };
  };

  // Get sorted month keys
  const allMonthKeys = () => {
    const keys = new Set();
    Object.keys(allMonths).forEach(k=>keys.add(k));
    Object.keys(avAllMonths).forEach(k=>keys.add(k));
    // Add current selected
    keys.add(selKey);
    return Array.from(keys).sort();
  };

  const getPrevMonthKey = (key) => {
    const sorted = allMonthKeys();
    const idx = sorted.indexOf(key);
    return idx>0 ? sorted[idx-1] : null;
  };

  // Calculate totals for a month
  const calcMonthTotals = (monthKey) => {
    const prevKey = getPrevMonthKey(monthKey);
    const donors  = (allMonths[monthKey]?.donors||[]).reduce((s,d)=>s+Number(d.amount||0),0);
    const datotDraft = Number(getMD(monthKey,"datot"));
    const kerenDraft = Number(getMD(monthKey,"keren"));
    const datot   = Number(getMD(monthKey,"datotConfirmed"));
    const keren   = Number(getMD(monthKey,"kerenConfirmed"));
    const income  = donors+datot+keren;
    const totalRounding = avrechim.filter(a=>a.active).reduce((s,av)=>{
      const c=calcAvrechMonth(av,monthKey,prevKey);
      return s+c.rounding;
    },0);
    const sent = Number(getMD(monthKey,"sent2000"))*2000+Number(getMD(monthKey,"sent1000"))*1000+Number(getMD(monthKey,"sentKeren"))*1000;
    const adjustment = Number(getMD(monthKey,"adjustment"))||0;
    const net = income - sent + adjustment;
    return { donors, datot, keren, datotDraft, kerenDraft, income, totalRounding, sent, adjustment, net };
  };

  const baseMonthKey = baseBalance.monthKey || "0000-00";

  // Cumulative live balance = base + sum of months >= base month with activity
  const monthHasActivity = k => {
    const md = allMonths[k]||{};
    return (md.donors||[]).length > 0 ||
      Number(md.datotConfirmed||0) > 0 ||
      Number(md.kerenConfirmed||0) > 0 ||
      Number(md.sent2000||0) > 0 ||
      Number(md.sent1000||0) > 0 ||
      Number(md.sentKeren||0)> 0 ||
      Number(md.adjustment||0)!==0;
  };
  const liveBalance = (() => {
    let sum = Number(baseBalance.amount||0);
    allMonthKeys().forEach(k=>{
      if(k >= baseMonthKey && monthHasActivity(k)) sum += calcMonthTotals(k).net;
    });
    return sum;
  })();

  const curTotals = calcMonthTotals(selKey);
  const prevKey   = getPrevMonthKey(selKey);

  // היסטוריית תורמים: שם → סכום אחרון (ממוין לפי מפתח חודש)
  const donorHistory = (() => {
    const map = {};
    Object.entries(allMonths)
      .sort(([a],[b])=>a.localeCompare(b))
      .forEach(([,m])=>{
        (m.donors||[]).forEach(d=>{
          if(d.name && Number(d.amount)>0) map[d.name]=Number(d.amount);
        });
      });
    return map;
  })();
  const allDonorNames = Object.keys(donorHistory);

  const totalOwed = avrechim.filter(a=>a.active).reduce((s,av)=>s+calcAvrechMonth(av,selKey,prevKey).effectiveBank,0);

  if(!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,color:"#475569"}}>
      <div style={{fontSize:32,fontWeight:800,color:"#1e3a5f"}}>סריקוב</div>
      <div style={{fontSize:14,opacity:.7}}>מתחבר לענן...</div>
      <div style={{width:40,height:40,border:"4px solid #e2e8f0",borderTop:"4px solid #2563eb",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    </div>
  );

  const tabS = t => ({padding:"7px 11px",borderRadius:8,border:tab===t?"2px solid #1e3a5f":"2px solid #e2e8f0",background:tab===t?"#1e3a5f":"#f8fafc",cursor:"pointer",fontWeight:600,fontSize:12,color:tab===t?"#fff":"#64748b"});

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <header style={{background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.08)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:720,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src="./logo.jpg" alt="לוגו" style={{height:52,width:"auto",objectFit:"contain"}}/>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#1e3a5f"}}>סריקוב</div>
              <div style={{fontSize:10,color:"#94a3b8",display:"flex",alignItems:"center",gap:4}}>
                מערכת ניהול כספים
                <span style={{width:6,height:6,borderRadius:"50%",background:syncing?"#f59e0b":"#22c55e",display:"inline-block"}}/>
                <span>{syncing?"שומר...":"מסונכרן ☁️"}</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            <button onClick={()=>setTab("main")}       style={tabS("main")}>🏠 ראשי</button>
            <button onClick={()=>setTab("avrechim")}   style={tabS("avrechim")}>👨‍🎓 אברכים</button>
            <button onClick={()=>setTab("attendance")} style={tabS("attendance")}>📋 נוכחות</button>
            <button onClick={()=>setTab("summary")}    style={tabS("summary")}>📂 סיכומים</button>
            <button onClick={()=>setTab("bank")}       style={tabS("bank")}>🏦 בנק</button>
            <button onClick={()=>setTab("settlement")} style={tabS("settlement")}>💰 חשבון</button>
            <button onClick={()=>setTab("ravpinchas")} style={{...tabS("ravpinchas"),background:tab==="ravpinchas"?"#064e3b":"#f8fafc",borderColor:tab==="ravpinchas"?"#064e3b":"#e2e8f0",color:tab==="ravpinchas"?"#fff":"#64748b"}}>📿 הרב פנחס</button>
          </div>
        </div>
      </header>

      {/* Month Selector */}
      <div style={{maxWidth:720,margin:"0 auto",padding:"10px 14px 0"}}>
        <div style={{background:"#fff",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",flexWrap:"wrap"}}>
          <span style={{fontWeight:700,fontSize:13,color:"#1e3a5f"}}>📅 חודש:</span>
          <button onClick={()=>{ let m=selMonth-1,y=selYear; if(m<0){m=11;y--;} setSelMonth(m);setSelYear(y); }}
            style={{...smallBtn,fontSize:16,padding:"2px 10px"}}>‹</button>
          <span style={{fontWeight:700,fontSize:15,color:"#1e293b",minWidth:110,textAlign:"center"}}>{mkMonthLabel(selYear,selMonth)}</span>
          <button onClick={()=>{ let m=selMonth+1,y=selYear; if(m>11){m=0;y++;} setSelMonth(m);setSelYear(y); }}
            style={{...smallBtn,fontSize:16,padding:"2px 10px"}}>›</button>
          <div style={{marginRight:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:12,color:"#64748b"}}>יתרה חיה:</span>
            <span style={{fontWeight:800,fontSize:15,color:"#2563eb"}}>{fmt(liveBalance)} ₪</span>
          </div>
        </div>
      </div>

      <main style={{maxWidth:720,margin:"0 auto",padding:"12px 14px"}}>
        {tab==="main"       && <MainTab selKey={selKey} selYear={selYear} selMonth={selMonth} baseBalance={baseBalance} setBaseBalance={setBaseBalance} liveBalance={liveBalance} curTotals={curTotals} allMonths={allMonths} getMD={getMD} setMonthField={setMonthField} syncing={syncing} allDonorNames={allDonorNames} donorHistory={donorHistory} avrechim={avrechim} />}
        {tab==="avrechim"   && <AvrechimTab avrechim={avrechim} setAvrechim={setAvrechim} selKey={selKey} prevKey={prevKey} selYear={selYear} selMonth={selMonth} getAV={getAV} getMD={getMD} setAvMonthField={setAvMonthField} calcAvrechMonth={calcAvrechMonth} totalOwed={totalOwed} attendance={attendance} customVacations={customVacations} beinHazmanims={beinHazmanims} hiddenHols={hiddenHols} />}
        {tab==="attendance" && <AttendanceTab avrechim={avrechim} selKey={selKey} selYear={selYear} selMonth={selMonth} attendance={attendance} setAttendanceDay={setAttendanceDay} fillMonthBatch={fillMonthBatch} customVacations={customVacations} setCustomVacation={setCustomVacation} removeCustomVacation={removeCustomVacation} beinHazmanims={beinHazmanims} addBeinHazmanim={addBeinHazmanim} removeBeinHazmanim={removeBeinHazmanim} updateBeinHazmanim={updateBeinHazmanim} hiddenHols={hiddenHols} toggleHolidayHidden={toggleHolidayHidden} />}
        {tab==="summary"    && <SummaryTab avrechim={avrechim} allMonthKeys={allMonthKeys()} calcMonthTotals={calcMonthTotals} calcAvrechMonth={calcAvrechMonth} getPrevMonthKey={getPrevMonthKey} baseBalance={baseBalance} liveBalance={liveBalance} selKey={selKey} allMonths={allMonths} getMD={getMD} setMonthField={setMonthField} />}
        {tab==="bank"       && <BankTab avrechim={avrechim} selKey={selKey} prevKey={prevKey} calcAvrechMonth={calcAvrechMonth} selYear={selYear} selMonth={selMonth} getAV={getAV} setAvMonthField={setAvMonthField} />}
        {tab==="settlement" && <SettlementTab avrechim={avrechim} selKey={selKey} prevKey={prevKey} calcAvrechMonth={calcAvrechMonth} selYear={selYear} selMonth={selMonth} getAV={getAV} setAvMonthField={setAvMonthField} allMonthKeys={allMonthKeys()} getPrevMonthKey={getPrevMonthKey} />}
        {tab==="ravpinchas" && <RavPinchasTab rpAvrechim={rpAvrechim} setRpAvrechim={setRpAvrechim} rpMonths={rpMonths} setRpMonthField={setRpMonthField} rpBaseBalance={rpBaseBalance} setRpBaseBalance={setRpBaseBalance} rpContact={rpContact} setRpContact={setRpContact} selKey={selKey} selYear={selYear} selMonth={selMonth} allDonorNames={allDonorNames} donorHistory={donorHistory} syncing={syncing} sarikowLiveBalance={liveBalance} />}
      </main>
    </div>
  );
}

// ── MAIN TAB ────────────────────────────────────────────────
function MainTab({ selKey, selYear, selMonth, baseBalance, setBaseBalance, liveBalance, curTotals, allMonths, getMD, setMonthField, allDonorNames, donorHistory, avrechim }){
  const [editBase,setEditBase]=useState(false);
  const [tempBase,setTempBase]=useState(baseBalance.amount);
  const [showDonor,setShowDonor]=useState(false);
  const [newDonor,setNewDonor]=useState({name:"",amount:""});
  const [showAdj,setShowAdj]=useState(false);
  const donors=(allMonths[selKey]?.donors)||[];

  // לכל אברך בקבוצה — חלוקה שווה של הכנסת דתות / קרן
  const datotCount = avrechim.filter(a=>a.active && (a.incomeGroup||(a.track==="keren"?"keren":"datot"))==="datot").length;
  const kerenCount = avrechim.filter(a=>a.active && (a.incomeGroup||(a.track==="keren"?"keren":"datot"))==="keren").length;
  const perDatot = datotCount>0 ? Math.round(Number(getMD(selKey,"datot"))/datotCount) : 0;
  const perKeren = kerenCount>0 ? Math.round(Number(getMD(selKey,"keren"))/kerenCount) : 0;

  return (
    <div style={col}>
      {/* BALANCE */}
      <div style={{background:"linear-gradient(135deg,#0f2044,#1d4ed8)",borderRadius:12,padding:"14px 16px",color:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:13,opacity:.75,marginBottom:4}}>יתרה חיה מצטברת</div>
        <div style={{fontSize:36,fontWeight:800}}>{fmt(liveBalance)} ₪</div>
        <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
          <Chip label="בסיס"          val={fmt(baseBalance.amount)+" ₪"} />
          <Chip label="הכנסות חודש"   val={"+"+fmt(curTotals.income)+" ₪"} pos />
          <Chip label="קיזוז עיגול"   val={"−"+fmt(curTotals.totalRounding)+" ₪"} neg />
          <Chip label="נשלח לאברכים"  val={"−"+fmt(curTotals.sent)+" ₪"} neg />
        </div>
        <div style={{marginTop:8,fontSize:12,opacity:.7}}>
          בסיס נכון לתאריך: {baseBalance.date}
          <button style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:12,marginRight:10,textDecoration:"underline"}}
            onClick={()=>{setTempBase(baseBalance.amount);setEditBase(true);}}>✏️ עדכן בסיס</button>
        </div>
      </div>

      {editBase && (
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>עדכון יתרת בסיס</div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...inp,flex:1}} type="number" value={tempBase} onChange={e=>setTempBase(e.target.value)} autoFocus/>
            <button style={greenBtn} onClick={()=>{setBaseBalance({amount:Number(tempBase)||0,date:new Date().toLocaleDateString("he-IL"),monthKey:mkMonthKey(now.getFullYear(),now.getMonth())});setEditBase(false);}}>שמור</button>
            <button style={grayBtn}  onClick={()=>setEditBase(false)}>ביטול</button>
          </div>
        </div>
      )}

      {/* DONORS */}
      <datalist id="donor-names-list">
        {allDonorNames.map((n,i)=><option key={i} value={n}/>)}
      </datalist>
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>💝 תורמים — {mkMonthLabel(selYear,selMonth)}</div>
            <div style={{marginTop:5,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>

                value={getMD(selKey,"summaryDate","")}

                <button style={{...smallBtn,fontSize:10,background:"#f0f9ff",color:"#0369a1",border:"1px solid #bae6fd"}}
                  onClick={()=>setMonthField(selKey,"summaryDate",new Date().toISOString().split("T")[0])}>

                      setMonthField(selKey,"donors",donors.map((x,j)=>{

                    <td style={td}><input style={{...iinp,textAlign:"left"}} type="number" value={d.amount} onChange={e=>setMonthField(selKey,"donors",donors.map((x,j)=>j===i?{...x,amount:e.target.value}:x))}/></td>
                    <td style={td}><button style={delBtn} onClick={()=>setMonthField(selKey,"donors",donors.filter((_,j)=>j!==i))}>✕</button></td>

              onUndo={()=>{
                setMonthField(selKey,"datotConfirmed",Number(getMD(selKey,"datotConfirmedPrev"))||0);
                setMonthField(selKey,"datotConfirmedPrev",null);

          <div>

              <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}}>
                <span style={{fontSize:11,color:"#059669",whiteSpace:"nowrap"}}>לאברך אחד ({kerenCount}):</span>
                <input style={{...iinp,textAlign:"left"}} type="number" value={perKeren||""} placeholder="0"
                  onChange={e=>setMonthField(selKey,"keren",Math.round((Number(e.target.value)||0)*kerenCount))} />
              </div>
            )}
            <BalanceConfirm draft={getMD(selKey,"keren")} confirmed={getMD(selKey,"kerenConfirmed")} prevConfirmed={getMD(selKey,"kerenConfirmedPrev",null)}
              onConfirm={()=>{
                setMonthField(selKey,"kerenConfirmedPrev",Number(getMD(selKey,"kerenConfirmed"))||0);
                setMonthField(selKey,"kerenConfirmed",Number(getMD(selKey,"keren"))||0);
              }}
              onUndo={()=>{

      {/* SENT */}

          <IField label="👨‍🎓 מספר × 1,000" value={getMD(selKey,"sent1000")}  onChange={v=>setMonthField(selKey,"sent1000",Number(v)||0)} />
          <IField label="📚 מספר × 1,000"      value={getMD(selKey,"sentKeren")} onChange={v=>setMonthField(selKey,"sentKeren",Number(v)||0)} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:8}}>
          <CBox label="שולם ×2000" val={fmt(getMD(selKey,"sent2000")*2000)+" ₪"} />
          <CBox label="שולם ×1000" val={fmt(getMD(selKey,"sent1000")*1000)+" ₪"} />

            {getMD(selKey,"adjustmentNote") && <span style={{color:"#78716c",fontWeight:400,marginRight:6}}>— {getMD(selKey,"adjustmentNote")}</span>}
          </div>
        )}
        {showAdj && (
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button style={{...smallBtn, background: getMD(selKey,"adjustment")>=0?"#16a34a":"#e2e8f0", color: getMD(selKey,"adjustment")>=0?"#fff":"#64748b", minWidth:36}}
                onClick={()=>{ const cur=getMD(selKey,"adjustment"); if(cur<0) setMonthField(selKey,"adjustment",-cur); }}>+</button>
              <input style={{...inp,flex:1,textAlign:"center"}} type="number"
                value={Math.abs(getMD(selKey,"adjustment")||0)}
                onChange={e=>{ const sign=getMD(selKey,"adjustment")<0?-1:1; setMonthField(selKey,"adjustment",sign*(Number(e.target.value)||0)); }}
                placeholder="סכום..." />
              <button style={{...smallBtn, background: getMD(selKey,"adjustment")<0?"#dc2626":"#e2e8f0", color: getMD(selKey,"adjustment")<0?"#fff":"#64748b", minWidth:36}}
                onClick={()=>{ const cur=getMD(selKey,"adjustment"); if(cur>0) setMonthField(selKey,"adjustment",-cur); }}>−</button>
            </div>
            <input style={inp} placeholder="הערה (אופציונלי)..."
              value={getMD(selKey,"adjustmentNote")||""}
              onChange={e=>setMonthField(selKey,"adjustmentNote",e.target.value)} />
            <div style={{fontSize:12,color:"#78716c",textAlign:"center"}}>
              {getMD(selKey,"adjustment")>0 ? `מוסיף ${fmt(getMD(selKey,"adjustment"))} ₪ לקופה` :
               getMD(selKey,"adjustment")<0 ? `גורע ${fmt(Math.abs(getMD(selKey,"adjustment")))} ₪ מהקופה` : "אין התאמה"}
            </div>
          </div>
        )}
      </div>

      {/* MINI SUMMARY */}
      <div style={{...card,background:"#f0fdf4",border:"1.5px solid #22c55e"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <span style={{fontWeight:700,fontSize:14}}>📊 סיכום {mkMonthLabel(selYear,selMonth)}</span>
          {getMD(selKey,"summaryDate") && (
            <span style={{fontSize:12,fontWeight:700,color:"#166534",background:"#bbf7d0",borderRadius:20,padding:"3px 10px"}}>
              📅 {getMD(selKey,"summaryDate").split("-").reverse().join("/")}
