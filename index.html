// ── SETTLEMENT TAB ───────────────────────────────────────────
function SettlementTab({ avrechim, selKey, prevKey, calcAvrechMonth, selYear, selMonth, getAV, setAvMonthField, allMonthKeys, getPrevMonthKey }){
  const [showCumulative,setShowCumulative] = useState(false);

  // לכל קבוצה (דתות/קרן) — הסכום האחרון שבאמת הוזן לאברך (לא 0), לשימוש כהערכה לחודשים שההעברה בהם עדיין לא הוזנה בראשי.
  // מסונכרן אוטומטית עם מה שמוזן בלשונית ראשי — כשמוזן סכום אמיתי חדש, ההערכה מתעדכנת ממנו לבד.
  const buildRecentExternalLookup = group => {
    const sampleAv = avrechim.find(a=>a.active && (a.incomeGroup||(a.track==="keren"?"keren":"datot"))===group);
    const lookup = {};
    if(!sampleAv) return lookup;
    let lastKnown = 0;
    [...(allMonthKeys||[])].sort().forEach(key=>{
      const pk = getPrevMonthKey(key);
      const c = calcAvrechMonth(sampleAv,key,pk);
      const val = group==="keren" ? c.autoKeren : c.autoDatot;
      if(val>0) lastKnown = val;
      lookup[key] = lastKnown;
    });
    return lookup;
  };
  const recentDatotLookup = buildRecentExternalLookup("datot");
  const recentKerenLookup = buildRecentExternalLookup("keren");

  // מצטבר לאורך כל החודשים: רק סכומי דתות/קרן שעדיין לא הוזנו בראשי לאותו חודש (לכל אברך, לפי הקבוצה שלו).
  // לדוגמה: יולי — דתות הוזן, קרן לא — אז רק אברכי קרן יופיעו עם הערכה עבור יולי.
  const cumulativeByAv = avrechim.filter(a=>a.active).map(av=>{
    const monthsOwed = (allMonthKeys||[]).map(key=>{
      const pk = getPrevMonthKey(key);
      const c = calcAvrechMonth(av,key,pk);
      if(c.monthly<=0) return null;
      if(getAV(key,av.id,"settlementPaid")==="1") return null;
      const isPending = c.incomeGroup==="keren" ? c.autoKeren===0 : c.autoDatot===0;
      if(!isPending) return null;
      const amount = Number((c.incomeGroup==="keren" ? recentKerenLookup[key] : recentDatotLookup[key])||0);
      if(amount<=0) return null;
      return { key, amount, isPending:true };
    }).filter(Boolean);
    const total = monthsOwed.reduce((s,m)=>s+m.amount,0);
    return { av, total, monthsOwed };
  }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
  const grandTotalCumulative = cumulativeByAv.reduce((s,r)=>s+r.total,0);

  const rows = avrechim.filter(a=>a.active).map(av=>({
    av,
    c: calcAvrechMonth(av,selKey,prevKey),
    paid: getAV(selKey,av.id,"settlementPaid")==="1"
  }));

  // חיובי = סריקוב חייב לאברך | שלילי = אברך חייב לסריקוב
  const iOweRows    = rows.filter(({c})=>c.settlementBalance>0 && (c.totalOwedToAv>0||c.prevSettlementCarryover!==0));
  const theyOweRows = rows.filter(({c})=>c.settlementBalance<0 && (c.totalOwedToAv>0||c.prevSettlementCarryover!==0));
  const evenRows    = rows.filter(({c})=>c.settlementBalance===0 && c.totalOwedToAv>0);
  const noDataRows  = rows.filter(({c})=>c.totalOwedToAv===0 && c.settlementBalance===0);

  const totalIOwe   = iOweRows.reduce((s,{c})=>s+c.settlementBalance,0);
  const totalOwedMe = theyOweRows.reduce((s,{c})=>s+Math.abs(c.settlementBalance),0);

  const paidIOwe    = iOweRows.filter(({paid})=>paid).reduce((s,{c})=>s+c.settlementBalance,0);
  const paidOwedMe  = theyOweRows.filter(({paid})=>paid).reduce((s,{c})=>s+Math.abs(c.settlementBalance),0);

  const ARow = ({av,c,paid})=>{
    const bal = c.settlementBalance;
    const absBal = Math.abs(bal);
    const iOwe = bal>0;
    const actualRaw = getAV(selKey,av.id,"settlementActual");
    const actual = actualRaw!==""?Number(actualRaw):null;
    const carryover = actual!==null ? (iOwe ? bal-actual : bal+actual) : null;

    const onActualChange = v => {
      setAvMonthField(selKey,av.id,"settlementActual",v);
      if(v!==""){
        const a=Number(v);
        setAvMonthField(selKey,av.id,"settlementCarryover", iOwe ? bal-a : bal+a);
      } else {
        setAvMonthField(selKey,av.id,"settlementCarryover","");
      }
    };

    return (
      <div style={{borderRadius:9,marginBottom:5,overflow:"hidden",
        border:`1.5px solid ${paid?"#86efac":iOwe?"#fde68a":"#fecaca"}`,
        background:paid?"#f0fdf4":iOwe?"#fffbeb":"#fef2f2",transition:"all .2s"}}>

        {/* שורה ראשית */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"9px 12px",opacity:paid?0.7:1,gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14}}>{av.name}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
              מגיע לו סה״כ: <b>{fmt(c.totalOwedToAv)} ₪</b>
              {(c.exams>0||c.taanitOwed>0)&&` (${fmt(c.monthly)}${c.exams>0?`+${fmt(c.exams)} בחינות`:""}${c.taanitOwed>0?`+${fmt(c.taanitOwed)} תענית דיבור`:""})`}
              &nbsp;|&nbsp;
              חיצוני (דתות/קרן, נפרד): {fmt(c.externalPerAvrech)} ₪ &nbsp;|&nbsp;
              מהקופה: {fmt(c.kupaPortion)} ₪
              {c.prevSettlementCarryover!==0&&<span style={{color:c.prevSettlementCarryover>0?"#d97706":"#dc2626",fontWeight:700}}>&nbsp;|&nbsp;פ׳קודם: {fmtSigned(c.prevSettlementCarryover)} ₪</span>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:800,color:iOwe?"#d97706":"#dc2626"}}>
                {iOwe?"▲":"▼"} {fmt(absBal)} ₪
              </div>
              <div style={{fontSize:10,color:"#94a3b8"}}>{iOwe?"סריקוב חייב":"אברך חייב"}</div>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",
              background:paid?"#16a34a":"#f1f5f9",border:`2px solid ${paid?"#16a34a":"#cbd5e1"}`,
              borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600,
              color:paid?"#fff":"#64748b",transition:"all .2s",userSelect:"none"}}>
              <input type="checkbox"
                checked={paid}
                onChange={e=>setAvMonthField(selKey,av.id,"settlementPaid",e.target.checked?"1":"")}
                style={{width:15,height:15,cursor:"pointer",accentColor:"#16a34a"}}/>
              {paid?"✓ בוצע":"סמן"}
            </label>
          </div>
        </div>

        {/* שורת תשלום בפועל */}
        {!paid&&(
          <div style={{borderTop:`1px solid ${iOwe?"#fde68a":"#fecaca"}`,padding:"8px 12px",
            background:iOwe?"rgba(253,230,138,.15)":"rgba(254,202,202,.15)",
            display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:110}}>
              <div style={{fontSize:11,color:"#475569",fontWeight:600,marginBottom:3}}>
                💰 {iOwe?"שולם לאברך בפועל":"התקבל מהאברך"} (₪)
              </div>
              <input type="number"
                style={{border:`2px solid ${actual!==null?"#f59e0b":"#cbd5e1"}`,
                  borderRadius:7,padding:"6px 9px",fontSize:14,width:"100%",
                  boxSizing:"border-box",textAlign:"left",background:"#fff"}}
                value={actualRaw}
                placeholder={String(absBal)}
                onChange={e=>onActualChange(e.target.value)}
              />
            </div>
            {carryover!==null&&(
              carryover===0
                ? <div style={{fontSize:13,color:"#16a34a",fontWeight:800,padding:"6px 0"}}>✅ מאוזן לגמרי</div>
                : <div style={{textAlign:"center",background:carryover>0?"#fffbeb":"#fef2f2",
                    borderRadius:8,padding:"5px 12px",
                    border:`1.5px solid ${carryover>0?"#f59e0b":"#f87171"}`}}>
                    <div style={{fontSize:10,color:"#64748b"}}>עובר לחודש הבא</div>
                    <div style={{fontSize:15,fontWeight:800,color:carryover>0?"#d97706":"#dc2626"}}>
                      {carryover>0?"▲":"▼"} {fmt(Math.abs(carryover))} ₪
                    </div>
                    <div style={{fontSize:9,color:"#94a3b8"}}>{carryover>0?"סריקוב עדיין חייב":"אברך עדיין חייב"}</div>
                  </div>
            )}
          </div>
        )}

        {/* כשסגור — הצג סיכום */}
        {paid&&actual!==null&&(
          <div style={{borderTop:"1px solid #86efac",padding:"5px 12px",
            background:"rgba(134,239,172,.15)",fontSize:11,color:"#166534",display:"flex",gap:10,flexWrap:"wrap"}}>
            <span>שולם: <b>{fmt(actual)} ₪</b></span>
            {carryover!==null&&carryover!==0&&<span style={{color:carryover>0?"#d97706":"#dc2626",fontWeight:700}}>
              | עובר לחודש הבא: {fmtSigned(carryover)} ₪
            </span>}
            {carryover===0&&<span>| ✓ מאוזן</span>}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={col}>
      {/* כפתור מעבר: חודש נוכחי / מצטבר */}
      <div style={{display:"flex",gap:6,background:"#fff",borderRadius:10,padding:"8px 12px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        {[[false,"📅 חודש נוכחי"],[true,"📊 דתות/קרן שטרם הוזנו — מצטבר לפי אברך"]].map(([v,l])=>(
          <button key={String(v)} onClick={()=>setShowCumulative(v)}
            style={{flex:1,padding:"7px",borderRadius:8,border:`2px solid ${showCumulative===v?"#7c3aed":"#e2e8f0"}`,
              background:showCumulative===v?"#7c3aed":"#f8fafc",color:showCumulative===v?"#fff":"#64748b",
              fontWeight:700,fontSize:12,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {showCumulative ? (
        <div style={col}>
          <div style={{background:"linear-gradient(135deg,#4c1d95,#7c3aed)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
            <div style={{fontSize:13,opacity:.8}}>סה״כ דתות/קרן שטרם הוזנו בראשי (כל החודשים שלא סומנו כשולם)</div>
            <div style={{fontSize:30,fontWeight:800}}>{fmt(grandTotalCumulative)} ₪</div>
          </div>

          <div style={{...card,borderRight:"4px solid #a78bfa",fontSize:11,color:"#78716c"}}>
            ℹ️ מוצגים כאן רק סכומי דתות/קרן שעדיין לא הוזנו בראשי לאותו חודש (למשל: יולי — דתות הוזן, קרן לא — יופיע כאן רק החלק של קרן). ההערכה מבוססת אוטומטית על הסכום האמיתי האחרון שכן הוזן לאותה קבוצה — אין צורך לעדכן ידנית.
          </div>

          {cumulativeByAv.length===0 && <div style={{...card,color:"#94a3b8",textAlign:"center"}}>אין סכומים מצטברים ממתינים — הכל מסומן כשולם או מכוסה</div>}
          {cumulativeByAv.map(({av,total,monthsOwed})=>(
            <div key={av.id} style={{...card,borderRight:"4px solid #7c3aed"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:700,fontSize:14}}>{av.name}</span>
                <span style={{fontWeight:800,fontSize:18,color:"#7c3aed"}}>{fmt(total)} ₪</span>
              </div>
              <div style={{fontSize:11,color:"#64748b",marginTop:6,display:"flex",flexWrap:"wrap",gap:6}}>
                {monthsOwed.map(m=>{
                  const [y,mo]=m.key.split("-");
                  return <span key={m.key} style={{background:m.isPending?"#fffbeb":"#f5f3ff",borderRadius:6,padding:"2px 8px"}}>
                    {mkMonthLabel(Number(y),Number(mo)-1)}: {fmt(m.amount)} ₪{m.isPending?" (משוער)":""}
                  </span>;
                })}
              </div>
            </div>
          ))}
        </div>
      ) : (
      <>
      {/* סיכום כולל */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{background:"linear-gradient(135deg,#92400e,#d97706)",borderRadius:12,padding:"14px",color:"#fff"}}>
          <div style={{fontSize:11,opacity:.8}}>אני חייב לאברכים</div>
          <div style={{fontSize:28,fontWeight:800}}>{fmt(totalIOwe)} ₪</div>
          <div style={{fontSize:11,opacity:.7,marginTop:2}}>שולם: {fmt(paidIOwe)} ₪</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#991b1b,#dc2626)",borderRadius:12,padding:"14px",color:"#fff"}}>
          <div style={{fontSize:11,opacity:.8}}>אברכים חייבים לי</div>
          <div style={{fontSize:28,fontWeight:800}}>{fmt(totalOwedMe)} ₪</div>
          <div style={{fontSize:11,opacity:.7,marginTop:2}}>הוחזר: {fmt(paidOwedMe)} ₪</div>
        </div>
      </div>

      {/* רשימה: אני חייב */}
      {iOweRows.length>0&&(
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,color:"#d97706",marginBottom:8}}>
            🟡 אני חייב לאברך ({iOweRows.length})
          </div>
          {iOweRows.map(({av,c,paid})=><ARow key={av.id} av={av} c={c} paid={paid}/>)}
        </div>
      )}

      {/* רשימה: אברך חייב לי */}
      {theyOweRows.length>0&&(
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,color:"#dc2626",marginBottom:8}}>
            🔴 אברך חייב לי ({theyOweRows.length})
          </div>
          {theyOweRows.map(({av,c,paid})=><ARow key={av.id} av={av} c={c} paid={paid}/>)}
        </div>
      )}

      {/* מאוזנים */}
      {evenRows.length>0&&(
        <div style={card}>
          <div style={{fontWeight:700,fontSize:13,color:"#16a34a",marginBottom:6}}>✅ מאוזן ({evenRows.length})</div>
          {evenRows.map(({av,c})=>(
            <div key={av.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 8px",borderRadius:7,background:"#f0fdf4",marginBottom:4}}>
              <span style={{fontWeight:600,fontSize:13}}>{av.name}</span>
              <span style={{fontSize:12,color:"#16a34a",fontWeight:700}}>✓ מאוזן — {fmt(c.totalOwedToAv)} ₪</span>
            </div>
          ))}
        </div>
      )}

      {/* ללא נתונים */}
      {noDataRows.length>0&&(
        <div style={{...card,opacity:0.6}}>
          <div style={{fontWeight:600,fontSize:12,color:"#94a3b8",marginBottom:5}}>⬜ ללא נתוני מגיע ({noDataRows.length})</div>
          <div style={{fontSize:12,color:"#94a3b8"}}>{noDataRows.map(({av})=>av.name).join(" | ")}</div>
        </div>
      )}
      </>
      )}
    </div>
  );
}

// ── RAV PINCHAS TAB ──────────────────────────────────────────
function RavPinchasTab({ rpAvrechim, setRpAvrechim, rpMonths, setRpMonthField, rpBaseBalance, setRpBaseBalance, rpContact, setRpContact, selKey, selYear, selMonth, allDonorNames, donorHistory, syncing, sarikowLiveBalance }) {
  const [editBase,   setEditBase]   = useState(false);
  const [tempBase,   setTempBase]   = useState(rpBaseBalance.amount);
  const [showDonor,  setShowDonor]  = useState(false);
  const [newDonor,   setNewDonor]   = useState({name:"",amount:""});
  const [showAddAv,  setShowAddAv]  = useState(false);
  const [newAv,      setNewAv]      = useState({name:"",amount:1000});
  const [editAvId,   setEditAvId]   = useState(null);
  const [showAdj,    setShowAdj]    = useState(false);
  const [rpView,     setRpView]     = useState("month"); // "month" | "history"
  const [openHist,   setOpenHist]   = useState(null);
  const [editContact,setEditContact]= useState(false);
  const [tempEmail,  setTempEmail]  = useState(rpContact.email||"");
  const [tempPhone,  setTempPhone]  = useState(rpContact.phone||"");
  const [sendScope,  setSendScope]  = useState("current"); // "current" | "specific" | "all"
  const [sendMonthKey,setSendMonthKey] = useState(selKey);

  const getMD = (field,def) => rpMonths[selKey]?.[field] ?? def;
  const donors    = getMD("donors",[]);
  const avAmounts = getMD("avAmounts",{});
  const avPaid    = getMD("avPaid",{});
  const adjustment= Number(getMD("adjustment",0));

  const activeAvrechim = rpAvrechim.filter(a=>a.active!==false);
  const allAvrechim    = rpAvrechim; // includes inactive (for history display)
  const getAvAmt = (av, md) => {
    const ovr = md ? md.avAmounts?.[av.id] : avAmounts[av.id];
    return ovr !== undefined ? Number(ovr) : Number(av.amount||1000);
  };

  const calcMonthTotals = (key) => {
    const md = rpMonths[key] || {};
    const donors = (md.donors||[]).reduce((s,d)=>s+Number(d.amount||0),0);
    const sent   = activeAvrechim.reduce((s,av)=>s+getAvAmt(av,md),0);
    const adj    = Number(md.adjustment||0);
    const net    = donors - sent + adj;
    return { donors, sent, adj, net };
  };

  const monthHasData = key => {
    const md = rpMonths[key]||{};
    return (md.donors||[]).length>0 || Number(md.adjustment||0)!==0;
  };

  const sortedMonthKeys = Object.keys(rpMonths)
    .filter(k => monthHasData(k))
    .sort();

  const liveBalance = (() => {
    let sum = Number(rpBaseBalance.amount||0);
    sortedMonthKeys.forEach(k => { sum += calcMonthTotals(k).net; });
    return sum;
  })();

  const calcCumBalance = (upToKey) => {
    let sum = Number(rpBaseBalance.amount||0);
    sortedMonthKeys.filter(k=>k<=upToKey).forEach(k=>{ sum += calcMonthTotals(k).net; });
    return sum;
  };

  // סה״כ משולב (סריקוב + הרב פנחס) — לצפייה בלבד, לא משפיע על שום חישוב
  const combinedTotal = Number(sarikowLiveBalance||0) + liveBalance;

  const monthDonors = donors.reduce((s,d)=>s+Number(d.amount||0),0);
  const monthSent   = activeAvrechim.reduce((s,av)=>s+getAvAmt(av,null),0);
  const monthNet    = monthDonors - monthSent + adjustment;

  // ── דו״ח לשליחה (מייל / סמס) ──
  const keyLabel = key => { const [y,m]=key.split("-"); return mkMonthLabel(Number(y),Number(m)-1); };

  const buildMonthReportText = key => {
    const md  = rpMonths[key] || {};
    const t   = calcMonthTotals(key);
    const cum = calcCumBalance(key);
    const avPaidMap = md.avPaid||{};
    const lines = [`דו״ח תנועות — ${keyLabel(key)}`, "", "💝 תרומות:"];
    if((md.donors||[]).length===0) lines.push("  אין תורמים");
    else (md.donors||[]).forEach(d=>lines.push(`  ${d.name}: ${fmt(d.amount)} ₪`));
    lines.push(`  סה״כ תרומות: ${fmt(t.donors)} ₪`, "", "👨‍🎓 לאברכים:");
    if(activeAvrechim.length===0) lines.push("  אין אברכים");
    else activeAvrechim.forEach(av=>{
      const amt = getAvAmt(av, md);
      const paid = avPaidMap[av.id]==="1";
      lines.push(`  ${av.name}: ${fmt(amt)} ₪${paid?" (שולם)":""}`);
    });
    lines.push(`  סה״כ לאברכים: ${fmt(t.sent)} ₪`);
    if(t.adj!==0) lines.push("", `⚖️ התאמה: ${fmtSigned(t.adj)} ₪`);
    lines.push("", `נטו חודש: ${fmtSigned(t.net)} ₪`, `💰 יתרה מצטברת: ${fmt(cum)} ₪`);
    return lines.join("\n");
  };

  const buildFullReportText = () => {
    if(sortedMonthKeys.length===0) return "אין נתונים עדיין";
    const lines = ["דו״ח תנועות מלא — כל החודשים", ""];
    sortedMonthKeys.forEach(key=>{
      lines.push(buildMonthReportText(key), "", "―――――――――――――――", "");
    });
    const totalDonors = sortedMonthKeys.reduce((s,k)=>s+calcMonthTotals(k).donors,0);
    const totalSent   = sortedMonthKeys.reduce((s,k)=>s+calcMonthTotals(k).sent,0);
    lines.push(`סה״כ כל התקופה — תרומות: ${fmt(totalDonors)} ₪, לאברכים: ${fmt(totalSent)} ₪`);
    lines.push(`💰 יתרה נוכחית: ${fmt(liveBalance)} ₪`);
    return lines.join("\n");
  };

  const monthOptions = Array.from(new Set([...sortedMonthKeys, selKey])).sort();

  const getReportKey  = () => sendScope==="specific" ? sendMonthKey : selKey;
  const getReportText = () => sendScope==="all" ? buildFullReportText() : buildMonthReportText(getReportKey());
  const getReportSubject = () => sendScope==="all" ? "דו״ח תנועות מלא — הרב פנחס" : `דו״ח תנועות — ${keyLabel(getReportKey())}`;

  const sendEmail = () => {
    const subject = encodeURIComponent(getReportSubject());
    const body    = encodeURIComponent(getReportText());
    window.location.href = `mailto:${rpContact.email||""}?subject=${subject}&body=${body}`;
  };
  const sendSms = () => {
    const body = encodeURIComponent(getReportText());
    window.location.href = `sms:${rpContact.phone||""}?body=${body}`;
  };

  const setDonors   = val => setRpMonthField(selKey,"donors",val);
  const setAvAmt    = (avId,val) => setRpMonthField(selKey,"avAmounts",{...avAmounts,[avId]:val});
  const clearAvAmt  = avId => { const u={...avAmounts}; delete u[avId]; setRpMonthField(selKey,"avAmounts",u); };
  const setAvPaidF  = (avId,val) => setRpMonthField(selKey,"avPaid",{...avPaid,[avId]:val});
  const updAv       = (id,k,v) => setRpAvrechim(p=>p.map(a=>a.id===id?{...a,[k]:v}:a));

  const paidCount   = activeAvrechim.filter(av=>avPaid[av.id]==="1").length;
  const allPaid     = paidCount===activeAvrechim.length && activeAvrechim.length>0;

  // ── כרטיס שליחת דו״ח (מייל / סמס) ──
  const sendReportCard = (
    <div style={card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
        <div style={{fontWeight:700,fontSize:14}}>📨 שליחת דו״ח תנועות לרב פנחס</div>
        <button style={{...smallBtn,fontSize:11}} onClick={()=>{setTempEmail(rpContact.email||"");setTempPhone(rpContact.phone||"");setEditContact(p=>!p);}}>
          {editContact?"סגור ✕":"✏️ פרטי קשר"}
        </button>
      </div>

      {editContact && (
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10,padding:10,background:"#f8fafc",borderRadius:8}}>
          <FG label="אימייל">
            <input style={{...inp,direction:"ltr",textAlign:"left"}} type="email" value={tempEmail} onChange={e=>setTempEmail(e.target.value)} placeholder="name@example.com"/>
          </FG>
          <FG label="טלפון (לסמס)">
            <input style={{...inp,direction:"ltr",textAlign:"left"}} type="tel" value={tempPhone} onChange={e=>setTempPhone(e.target.value)} placeholder="05XXXXXXXX"/>
          </FG>
          <button style={greenBtn} onClick={()=>{setRpContact({email:tempEmail,phone:tempPhone});setEditContact(false);}}>שמור פרטי קשר</button>
        </div>
      )}

      {!editContact && (rpContact.email||rpContact.phone) && (
        <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>
          {rpContact.email && <span>📧 {rpContact.email}</span>}
          {rpContact.email && rpContact.phone && <span> · </span>}
          {rpContact.phone && <span style={{direction:"ltr",display:"inline-block"}}>📱 {rpContact.phone}</span>}
        </div>
      )}
      {!editContact && !rpContact.email && !rpContact.phone && (
        <div style={{fontSize:11,color:"#f59e0b",marginBottom:8}}>לא הוגדרו פרטי קשר — לחץ ״פרטי קשר״ כדי להוסיף</div>
      )}

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
        {[["current","📅 חודש נוכחי"],["specific","🗓️ חודש נבחר"],["all","📂 הכל"]].map(([v,l])=>(
          <button key={v} onClick={()=>setSendScope(v)}
            style={{padding:"6px 10px",borderRadius:7,border:`1.5px solid ${sendScope===v?"#0369a1":"#e2e8f0"}`,
              background:sendScope===v?"#0369a1":"#f8fafc",color:sendScope===v?"#fff":"#64748b",
              fontWeight:600,fontSize:12,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {sendScope==="specific" && (
        <select style={{...inp,marginBottom:8}} value={sendMonthKey} onChange={e=>setSendMonthKey(e.target.value)}>
          {monthOptions.map(k=><option key={k} value={k}>{keyLabel(k)}</option>)}
        </select>
      )}

      <div style={{display:"flex",gap:8}}>
        <button style={{...greenBtn,flex:1,opacity:rpContact.email?1:0.5}} disabled={!rpContact.email} onClick={sendEmail}>📧 שלח במייל</button>
        <button style={{...greenBtn,flex:1,background:"#0369a1",opacity:rpContact.phone?1:0.5}} disabled={!rpContact.phone} onClick={sendSms}>💬 שלח בסמס</button>
      </div>
    </div>
  );

  // ── לשונית היסטוריה ──
  if (rpView === "history") return (
    <div style={col}>
      <div style={{display:"flex",gap:6,background:"#fff",borderRadius:10,padding:"8px 12px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        {[["month","📅 חודש נוכחי"],["history","📂 היסטוריה"]].map(([v,l])=>(
          <button key={v} onClick={()=>setRpView(v)}
            style={{flex:1,padding:"7px",borderRadius:8,border:`2px solid ${rpView===v?"#059669":"#e2e8f0"}`,
              background:rpView===v?"#059669":"#f8fafc",color:rpView===v?"#fff":"#64748b",
              fontWeight:700,fontSize:13,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>
      <div style={{background:"linear-gradient(135deg,#064e3b,#059669)",borderRadius:12,padding:"14px 16px",color:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:13,opacity:.75,marginBottom:4}}>💰 יתרה חיה — הרב פנחס</div>
        <div style={{fontSize:32,fontWeight:800}}>{fmt(liveBalance)} ₪</div>
        <div style={{fontSize:12,opacity:.7,marginTop:4}}>בסיס: {fmt(rpBaseBalance.amount)} ₪ ({rpBaseBalance.date||"—"}) + כל החודשים</div>
        <div style={{marginTop:10,background:"rgba(255,255,255,.14)",borderRadius:8,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,opacity:.9}}>💰 סה״כ כללי (סריקוב + הרב פנחס) — לצפייה בלבד</span>
          <span style={{fontWeight:800,fontSize:16}}>{fmt(combinedTotal)} ₪</span>
        </div>
      </div>

      {sendReportCard}

      {sortedMonthKeys.length===0 && (
        <div style={{...card,color:"#94a3b8",textAlign:"center"}}>אין נתונים עדיין</div>
      )}

      {/* ── טבלת סיכום כל החודשים ── */}
      {sortedMonthKeys.length>0&&(
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"#064e3b"}}>📊 סיכום כל החודשים</div>
          <div style={{overflowX:"auto"}}>
            <table style={{...tbl,fontSize:12}}>
              <thead>
                <tr>
                  <th style={{...th,textAlign:"right"}}>חודש</th>
                  <th style={{...th,textAlign:"left"}}>💝 תרומות</th>
                  <th style={{...th,textAlign:"left"}}>👨‍🎓 לאברכים</th>
                  <th style={{...th,textAlign:"left"}}>נטו</th>
                  <th style={{...th,textAlign:"left"}}>💰 יתרה</th>
                </tr>
              </thead>
              <tbody>
                {sortedMonthKeys.map(key=>{
                  const [y,m]=key.split("-");
                  const label=mkMonthLabel(Number(y),Number(m)-1);
                  const t=calcMonthTotals(key);
                  const cum=calcCumBalance(key);
                  return (
                    <tr key={key} style={{borderBottom:"1px solid #f1f5f9",cursor:"pointer",background:openHist===key?"#f0fdf4":"#fff"}}
                      onClick={()=>setOpenHist(openHist===key?null:key)}>
                      <td style={{...td,fontWeight:600,whiteSpace:"nowrap"}}>{label}</td>
                      <td style={{...td,textAlign:"left",color:"#16a34a",fontWeight:600}}>{fmt(t.donors)}</td>
                      <td style={{...td,textAlign:"left",color:"#dc2626"}}>{fmt(t.sent)}</td>
                      <td style={{...td,textAlign:"left",fontWeight:700,color:t.net>=0?"#16a34a":"#dc2626"}}>
                        {t.net>=0?"+":""}{fmt(t.net)}
                      </td>
                      <td style={{...td,textAlign:"left",fontWeight:700,color:"#1d4ed8"}}>{fmt(cum)}</td>
                    </tr>
                  );
                })}
                <tr style={{background:"#f0fdf4",borderTop:"2px solid #22c55e"}}>
                  <td style={{...td,fontWeight:800}}>סה״כ</td>
                  <td style={{...td,textAlign:"left",fontWeight:800,color:"#16a34a"}}>
                    {fmt(sortedMonthKeys.reduce((s,k)=>s+calcMonthTotals(k).donors,0))}
                  </td>
                  <td style={{...td,textAlign:"left",fontWeight:800,color:"#dc2626"}}>
                    {fmt(sortedMonthKeys.reduce((s,k)=>s+calcMonthTotals(k).sent,0))}
                  </td>
                  <td style={{...td,textAlign:"left",fontWeight:800,color:(liveBalance-Number(rpBaseBalance.amount||0))>=0?"#16a34a":"#dc2626"}}>
                    {(liveBalance-Number(rpBaseBalance.amount||0))>=0?"+":""}{fmt(liveBalance-Number(rpBaseBalance.amount||0))}
                  </td>
                  <td style={{...td,textAlign:"left",fontWeight:800,color:"#059669"}}>{fmt(liveBalance)}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:6,textAlign:"center"}}>לחץ על חודש לפרטים</div>
        </div>
      )}

      {[...sortedMonthKeys].reverse().map(key=>{
        const [y,m] = key.split("-");
        const label = mkMonthLabel(Number(y), Number(m)-1);
        const t     = calcMonthTotals(key);
        const md    = rpMonths[key]||{};
        const isOpen= openHist===key;
        const cumBal= calcCumBalance(key);
        const avPaidMap = md.avPaid||{};

        return (
          <div key={key} style={card}>
            <button onClick={()=>setOpenHist(isOpen?null:key)}
              style={{background:"none",border:"none",cursor:"pointer",width:"100%",textAlign:"right",
                display:"flex",justifyContent:"space-between",alignItems:"center",padding:0}}>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontWeight:700,fontSize:14}}>{label}</span>
                <span style={{fontSize:12,color:t.net>=0?"#16a34a":"#dc2626",fontWeight:600}}>
                  {t.net>=0?"+":""}{fmt(t.net)} ₪ נטו
                </span>
                {t.donors>0&&<span style={{fontSize:11,color:"#94a3b8"}}>תרומות: {fmt(t.donors)} ₪</span>}
              </div>
              <span style={{color:"#94a3b8"}}>{isOpen?"▲":"▼"}</span>
            </button>

            {isOpen&&(
              <div style={{marginTop:12}}>
                <MR l="💝 תרומות"       v={t.donors}/>
                <MR l="👨‍🎓 לאברכים"   v={-t.sent} neg/>
                {t.adj!==0&&<MR l="⚖️ התאמה" v={t.adj} color={t.adj>0?"#16a34a":"#dc2626"}/>}
                <div style={divider}/>
                <MR l="נטו חודש" v={t.net} bold color={t.net>=0?"#16a34a":"#dc2626"}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  background:"#eff6ff",borderRadius:8,padding:"8px 12px",marginTop:8,border:"1.5px solid #bfdbfe"}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#1d4ed8"}}>💰 יתרה מצטברת עד חודש זה</span>
                  <span style={{fontWeight:800,fontSize:18,color:"#1d4ed8"}}>{fmt(cumBal)} ₪</span>
                </div>

                {/* פירוט תורמים */}
                {(md.donors||[]).length>0&&(
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:5}}>פירוט תורמים:</div>
                    <table style={tbl}>
                      <thead><tr><th style={th}>שם</th><th style={th}>סכום</th></tr></thead>
                      <tbody>
                        {(md.donors||[]).map((d,i)=>(
                          <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                            <td style={td}>{d.name}</td>
                            <td style={{...td,fontWeight:600}}>{fmt(d.amount)} ₪</td>
                          </tr>
                        ))}
                        <tr style={{background:"#f0fdf4"}}>
                          <td style={{...td,fontWeight:700}}>סה״כ</td>
                          <td style={{...td,fontWeight:700}}>{fmt(t.donors)} ₪</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                )}

                {/* פירוט אברכים */}
                {activeAvrechim.length>0&&(
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:5}}>פירוט אברכים:</div>
                    <table style={tbl}>
                      <thead><tr><th style={th}>שם</th><th style={th}>סכום</th><th style={{...th,textAlign:"center"}}>שולם</th></tr></thead>
                      <tbody>
                        {activeAvrechim.map(av=>{
                          const amt  = getAvAmt(av, md);
                          const paid = avPaidMap[av.id]==="1";
                          return (
                            <tr key={av.id} style={{borderBottom:"1px solid #f1f5f9",background:paid?"#f0fdf4":"#fff"}}>
                              <td style={td}>{av.name}</td>
                              <td style={{...td,fontWeight:600}}>{fmt(amt)} ₪</td>
                              <td style={{...td,textAlign:"center"}}>
                                <span style={{fontSize:11,fontWeight:700,color:paid?"#16a34a":"#94a3b8"}}>
                                  {paid?"✓ שולם":"—"}
                                </span>
                              </td>
                            </tr>
                          );
                        })}
                        <tr style={{background:"#fef2f2"}}>
                          <td style={{...td,fontWeight:700}}>סה״כ</td>
                          <td style={{...td,fontWeight:700}}>{fmt(t.sent)} ₪</td>
                          <td style={{...td,textAlign:"center",fontSize:11,color:"#94a3b8"}}>
                            {activeAvrechim.filter(av=>avPaidMap[av.id]==="1").length}/{activeAvrechim.length}
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );

  return (
    <div style={col}>

      {/* ── כרטיס יתרה ── */}
      {/* ── toggle view ── */}
      <div style={{display:"flex",gap:6,background:"#fff",borderRadius:10,padding:"8px 12px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        {[["month","📅 חודש נוכחי"],["history","📂 היסטוריה"]].map(([v,l])=>(
          <button key={v} onClick={()=>setRpView(v)}
            style={{flex:1,padding:"7px",borderRadius:8,border:`2px solid ${rpView===v?"#059669":"#e2e8f0"}`,
              background:rpView===v?"#059669":"#f8fafc",color:rpView===v?"#fff":"#64748b",
              fontWeight:700,fontSize:13,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{background:"linear-gradient(135deg,#064e3b,#059669)",borderRadius:12,padding:"14px 16px",color:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:13,opacity:.75,marginBottom:4}}>💰 יתרה חיה — הרב פנחס</div>
        <div style={{fontSize:36,fontWeight:800}}>{fmt(liveBalance)} ₪</div>
        <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
          <Chip label="בסיס"        val={fmt(rpBaseBalance.amount)+" ₪"} />
          <Chip label="הכנסות חודש" val={"+"+fmt(monthDonors)+" ₪"} pos />
          <Chip label="לאברכים"     val={"−"+fmt(monthSent)+" ₪"} neg />
        </div>
        <div style={{marginTop:8,fontSize:12,opacity:.7}}>
          בסיס נכון לתאריך: {rpBaseBalance.date||"—"}
          <button style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:12,marginRight:10,textDecoration:"underline"}}
            onClick={()=>{setTempBase(rpBaseBalance.amount);setEditBase(true);}}>✏️ עדכן בסיס</button>
        </div>
        <div style={{marginTop:10,background:"rgba(255,255,255,.14)",borderRadius:8,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,opacity:.9}}>💰 סה״כ כללי (סריקוב + הרב פנחס) — לצפייה בלבד</span>
          <span style={{fontWeight:800,fontSize:16}}>{fmt(combinedTotal)} ₪</span>
        </div>
      </div>

      {editBase&&(
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>עדכון יתרת בסיס</div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...inp,flex:1}} type="number" value={tempBase} onChange={e=>setTempBase(e.target.value)} autoFocus/>
            <button style={greenBtn} onClick={()=>{setRpBaseBalance({amount:Number(tempBase)||0,date:new Date().toLocaleDateString("he-IL")});setEditBase(false);}}>שמור</button>
            <button style={grayBtn}  onClick={()=>setEditBase(false)}>ביטול</button>
          </div>
        </div>
      )}

      {sendReportCard}

      {/* ── תורמים ── */}
      <datalist id="rp-donor-list">
        {allDonorNames.map((n,i)=><option key={i} value={n}/>)}
      </datalist>
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div style={{fontWeight:700,fontSize:14}}>💝 תורמים — {mkMonthLabel(selYear,selMonth)}</div>
          <button style={addBtn} onClick={()=>setShowDonor(true)}>+ הוסף</button>
        </div>
        {donors.length===0
          ? <div style={empty}>לחץ ״+ הוסף״ להוסיף תורם</div>
          : <table style={tbl}>
              <thead><tr><th style={th}>שם</th><th style={th}>סכום (₪)</th><th style={th}></th></tr></thead>
              <tbody>
                {donors.map((d,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                    <td style={td}><input style={iinp} list="rp-donor-list" value={d.name} onChange={e=>{
                      const name=e.target.value;
                      setDonors(donors.map((x,j)=>j!==i?x:{...x,name,amount:donorHistory[name]!==undefined?donorHistory[name]:x.amount}));
                    }}/></td>
                    <td style={td}><input style={{...iinp,textAlign:"left"}} type="number" value={d.amount}
                      onChange={e=>setDonors(donors.map((x,j)=>j===i?{...x,amount:e.target.value}:x))}/></td>
                    <td style={td}><button style={delBtn} onClick={()=>setDonors(donors.filter((_,j)=>j!==i))}>✕</button></td>
                  </tr>
                ))}
                <tr style={{background:"#f0fdf4"}}><td style={{...td,fontWeight:700}}>סה״כ</td><td style={{...td,fontWeight:700}}>{fmt(monthDonors)} ₪</td><td/></tr>
              </tbody>
            </table>
        }
      </div>

      {/* ── התאמה ידנית ── */}
      <div style={{...card,border:"1.5px solid #f59e0b",background:"#fffbeb"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:14}}>⚖️ התאמה ידנית לקופה</span>
          <button style={{...smallBtn,background:showAdj?"#f59e0b":"#fef3c7",color:showAdj?"#fff":"#92400e",border:"1px solid #f59e0b"}}
            onClick={()=>setShowAdj(p=>!p)}>{showAdj?"סגור ✕":"± פתח"}</button>
        </div>
        {adjustment!==0&&!showAdj&&(
          <div style={{marginTop:6,fontSize:13,color:adjustment>0?"#16a34a":"#dc2626",fontWeight:700}}>
            {adjustment>0?"הוספה":"גריעה"}: {fmtSigned(adjustment)} ₪
          </div>
        )}
        {showAdj&&(
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button style={{...smallBtn,background:adjustment>=0?"#16a34a":"#e2e8f0",color:adjustment>=0?"#fff":"#64748b",minWidth:36}}
                onClick={()=>{ if(adjustment<0) setRpMonthField(selKey,"adjustment",-adjustment); }}>+</button>
              <input style={{...inp,flex:1,textAlign:"center"}} type="number"
                value={Math.abs(adjustment||0)}
                onChange={e=>{ const sign=adjustment<0?-1:1; setRpMonthField(selKey,"adjustment",sign*(Number(e.target.value)||0)); }}
                placeholder="סכום..."/>
              <button style={{...smallBtn,background:adjustment<0?"#dc2626":"#e2e8f0",color:adjustment<0?"#fff":"#64748b",minWidth:36}}
                onClick={()=>{ if(adjustment>0) setRpMonthField(selKey,"adjustment",-adjustment); }}>−</button>
            </div>
            <div style={{fontSize:12,color:"#78716c",textAlign:"center"}}>
              {adjustment>0?`מוסיף ${fmt(adjustment)} ₪ לקופה`:adjustment<0?`גורע ${fmt(Math.abs(adjustment))} ₪ מהקופה`:"אין התאמה"}
            </div>
          </div>
        )}
      </div>

      {/* ── אברכים ── */}
      <div style={{...card,background:allPaid?"#f0fdf4":"#fff",border:allPaid?"1.5px solid #22c55e":"1px solid #e2e8f0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{allPaid?"✅ ":"👨‍🎓 "}אברכים — {mkMonthLabel(selYear,selMonth)}</div>
            {activeAvrechim.length>0&&(
              <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
                {paidCount}/{activeAvrechim.length} שולמו
              </div>
            )}
          </div>
          <button style={addBtn} onClick={()=>setShowAddAv(true)}>+ הוסף אברך</button>
        </div>

        {activeAvrechim.length===0
          ? <div style={empty}>לחץ ״+ הוסף אברך״ להוסיף</div>
          : activeAvrechim.map(av=>{
              const isEdit = editAvId===av.id;
              const amt    = getAvAmt(av);
              const paid   = avPaid[av.id]==="1";
              const hasOvr = avAmounts[av.id]!==undefined;
              return (
                <div key={av.id} style={{borderRadius:9,marginBottom:6,border:`1.5px solid ${paid?"#86efac":"#e2e8f0"}`,
                  background:paid?"#f0fdf4":"#fff",overflow:"hidden",transition:"all .2s"}}>

                  {/* שורה ראשית */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",opacity:paid?0.75:1,gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      {isEdit
                        ? <input style={iinp} value={av.name} onChange={e=>updAv(av.id,"name",e.target.value)} autoFocus/>
                        : <span style={{fontWeight:700,fontSize:14}}>{av.name}</span>}
                      {paid&&<span style={{fontSize:11,color:"#16a34a",marginRight:6,fontWeight:600}}> ✓ שולם</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      <span style={{fontWeight:800,fontSize:16,color:paid?"#059669":"#1e3a5f"}}>{fmt(amt)} ₪</span>
                      <button style={smallBtn} onClick={()=>setEditAvId(isEdit?null:av.id)}>{isEdit?"✓":"✏️"}</button>
                      <button style={{...smallBtn,background:"#fee2e2",color:"#dc2626"}} onClick={()=>updAv(av.id,"active",false)}>✕</button>
                    </div>
                  </div>

                  {/* עריכת ברירת מחדל */}
                  {isEdit&&(
                    <div style={{borderTop:"1px solid #e2e8f0",padding:"8px 12px",background:"#f8fafc",display:"flex",gap:8,alignItems:"center"}}>
                      <label style={{fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>סכום קבוע (₪):</label>
                      <input style={{...iinp,flex:1,textAlign:"left"}} type="number"
                        value={av.amount||1000} onChange={e=>updAv(av.id,"amount",Number(e.target.value)||1000)}/>
                    </div>
                  )}

                  {/* סכום חודשי + כפתור שולם */}
                  <div style={{borderTop:"1px solid #f1f5f9",padding:"7px 12px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{display:"flex",gap:4,alignItems:"center",flex:1,minWidth:130}}>
                      <label style={{fontSize:11,color:"#64748b",whiteSpace:"nowrap"}}>החודש (₪):</label>
                      <input style={{...iinp,flex:1,textAlign:"left",border:hasOvr?"2px solid #f59e0b":"1px solid #e2e8f0"}}
                        type="number"
                        value={hasOvr ? avAmounts[av.id] : (av.amount||1000)}
                        onChange={e=>setAvAmt(av.id,e.target.value)}
                        placeholder={String(av.amount||1000)}/>
                      {hasOvr&&(
                        <button style={{...smallBtn,fontSize:10,padding:"2px 6px"}} onClick={()=>clearAvAmt(av.id)}>↺</button>
                      )}
                    </div>
                    <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",
                      background:paid?"#16a34a":"#f1f5f9",border:`2px solid ${paid?"#16a34a":"#cbd5e1"}`,
                      borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600,
                      color:paid?"#fff":"#64748b",transition:"all .2s",userSelect:"none"}}>
                      <input type="checkbox" checked={paid}
                        onChange={e=>setAvPaidF(av.id,e.target.checked?"1":"")}
                        style={{width:14,height:14,cursor:"pointer",accentColor:"#16a34a"}}/>
                      {paid?"✓ שולם":"סמן שולם"}
                    </label>
                  </div>
                </div>
              );
            })
        }

        {activeAvrechim.length>0&&(
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"#f0fdf4",borderRadius:8,marginTop:4}}>
            <span style={{fontWeight:700,fontSize:13,color:"#14532d"}}>סה״כ לאברכים:</span>
            <span style={{fontWeight:800,fontSize:15,color:"#059669"}}>{fmt(monthSent)} ₪</span>
          </div>
        )}

        {/* לא פעילים */}
        {rpAvrechim.filter(a=>a.active===false).length>0&&(
          <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #e2e8f0"}}>
            <div style={{fontWeight:600,color:"#94a3b8",marginBottom:4,fontSize:12}}>לא פעילים</div>
            {rpAvrechim.filter(a=>a.active===false).map(av=>(
              <div key={av.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",color:"#94a3b8",fontSize:12}}>
                <span>{av.name}</span>
                <button style={smallBtn} onClick={()=>updAv(av.id,"active",true)}>שחזר</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── סיכום חודש ── */}
      <div style={{...card,background:"#f0fdf4",border:"1.5px solid #22c55e"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📊 סיכום {mkMonthLabel(selYear,selMonth)}</div>
        <MR l="הכנסות תורמים"  v={monthDonors} />
        <MR l="הוצאות לאברכים" v={-monthSent} neg />
        {adjustment!==0&&<MR l={adjustment>0?"התאמה ➕":"התאמה ➖"} v={adjustment} color={adjustment>0?"#16a34a":"#dc2626"}/>}
        <div style={divider}/>
        <MR l="נטו חודש זה" v={monthNet} bold color={monthNet>=0?"#16a34a":"#dc2626"}/>
        <div style={{height:1,background:"rgba(34,197,94,0.4)",margin:"8px 0"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
          <span style={{fontWeight:800,fontSize:15,color:"#14532d"}}>💰 יתרה כוללת בקופה</span>
          <span style={{fontWeight:800,fontSize:22,color:"#15803d"}}>{fmt(liveBalance)} ₪</span>
        </div>
      </div>

      {/* ── מודל הוספת תורם ── */}
      {showDonor&&(
        <Modal title="הוספת תורם" onClose={()=>setShowDonor(false)}>
          <FG label="שם התורם">
            <input style={inp} list="rp-donor-list" value={newDonor.name} onChange={e=>{
              const name=e.target.value;
              setNewDonor(p=>({...p,name,amount:donorHistory[name]!==undefined?donorHistory[name]:p.amount}));
            }} placeholder="שם..."/>
          </FG>
          <FG label="סכום (₪)">
            <input style={inp} type="number" value={newDonor.amount}
              onChange={e=>setNewDonor(p=>({...p,amount:e.target.value}))} placeholder="0"/>
          </FG>
          <button style={primaryBtn} onClick={()=>{
            if(!newDonor.name||!newDonor.amount) return;
            setDonors([...donors,{name:newDonor.name,amount:Number(newDonor.amount)}]);
            setNewDonor({name:"",amount:""});
            setShowDonor(false);
          }}>הוסף</button>
        </Modal>
      )}

      {/* ── מודל הוספת אברך ── */}
      {showAddAv&&(
        <Modal title="הוספת אברך" onClose={()=>setShowAddAv(false)}>
          <FG label="שם האברך">
            <input style={inp} value={newAv.name} onChange={e=>setNewAv(p=>({...p,name:e.target.value}))} placeholder="שם..."/>
          </FG>
          <FG label="סכום חודשי (₪)">
            <input style={inp} type="number" value={newAv.amount}
              onChange={e=>setNewAv(p=>({...p,amount:e.target.value}))} placeholder="1000"/>
          </FG>
          <button style={{...primaryBtn,background:"#059669"}} onClick={()=>{
            if(!newAv.name) return;
            setRpAvrechim(p=>[...p,{id:Date.now(),name:newAv.name,amount:Number(newAv.amount)||1000,active:true}]);
            setNewAv({name:"",amount:1000});
            setShowAddAv(false);
          }}>הוסף אברך</button>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
