        </div>
        <MR l="תורמים"         v={curTotals.donors} />
        <MR l="דתות"           v={curTotals.datot} />
        <MR l="קרן"            v={curTotals.keren} />
        <MR l="נשלח לאברכים"  v={-curTotals.sent} neg />
        {curTotals.adjustment!==0 && <MR l={curTotals.adjustment>0?"התאמה ➕":"התאמה ➖"} v={curTotals.adjustment} color={curTotals.adjustment>0?"#16a34a":"#dc2626"} />}
        <div style={divider}/>
        <MR l="נטו חודש זה" v={curTotals.net} bold color={curTotals.net>=0?"#16a34a":"#dc2626"} />
        <div style={{height:1,background:"rgba(34,197,94,0.4)",margin:"8px 0"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
          <span style={{fontWeight:800,fontSize:15,color:"#14532d"}}>💰 יתרה כוללת בקופה</span>
          <span style={{fontWeight:800,fontSize:22,color:"#15803d"}}>{fmt(liveBalance)} ₪</span>
        </div>
        {getMD(selKey,"summaryDate") && (
          <div style={{fontSize:11,color:"#166534",textAlign:"center",marginTop:3,background:"#bbf7d0",borderRadius:8,padding:"3px 8px"}}>
            📅 תאריך פגישה עם סריקוב: {getMD(selKey,"summaryDate").split("-").reverse().join("/")}
          </div>
        )}
      </div>

      {showDonor && (
        <Modal title="הוספת תורם" onClose={()=>setShowDonor(false)}>
          <FG label="שם התורם"><input style={inp} list="donor-names-list" value={newDonor.name} onChange={e=>{
            const name=e.target.value;
            setNewDonor(p=>({...p, name, amount: donorHistory[name]!==undefined ? donorHistory[name] : p.amount}));
          }} placeholder="שם..."/></FG>
          <FG label="סכום (₪)"><input style={inp} type="number" value={newDonor.amount} onChange={e=>setNewDonor(p=>({...p,amount:e.target.value}))} placeholder="0"/></FG>
          <button style={primaryBtn} onClick={()=>{
            if(!newDonor.name||!newDonor.amount) return;
            setMonthField(selKey,"donors",[...donors,{name:newDonor.name,amount:Number(newDonor.amount)}]);
            setNewDonor({name:"",amount:""});
            setShowDonor(false);
          }}>הוסף</button>
        </Modal>
      )}
    </div>
  );
}

// ── IMPORT MODAL (JB) ────────────────────────────────────────
function ImportModal({ avrechim, selKey, setAvMonthField, onClose }){
  const [jbData,setJbData]=useState(null);
  const [rows,setRows]=useState([]);
  const [importing,setImporting]=useState(false);

  const loadFile = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const data = JSON.parse(ev.target.result);
        if(!data.workers) throw new Error('Invalid');
        // Auto-match by name
        const matched = data.workers.map(w=>{
          let av = avrechim.find(a=>a.active && a.name===w.name);
          if(!av){
            const parts = w.name.trim().split(/\s+/);
            // Try matching last name (first word in Hebrew is first name, last word is last name)
            av = avrechim.find(a=>a.active && parts.some(p=>p.length>2 && a.name.includes(p)));
          }
          // אם יש סכום מדויק מ-JB (מקובץ XLS) — להשתמש בו ישירות
          // אחרת — לחשב לפי ימים × מקסימום מלגה
          const jbSalary = w.salary ? Math.round(w.salary) : null;
          const maxS = av?Number(av.maxStipend||1600):0;
          const calc = jbSalary !== null ? jbSalary
                     : av ? Math.round(w.days/data.total_days*maxS) : 0;
          return { jbName:w.name, jbId:w.jb_id, days:w.days, pct:w.pct,
                   jbSalary, avId:av?av.id:null, stipend:calc, skip:false };
        });
        setJbData(data);
        setRows(matched);
      }catch(e){ alert('שגיאה בקריאת הקובץ — ודא שהרצת jb_export.py'); }
    };
    reader.readAsText(file,'utf-8');
  };

  const updRow=(i,patch)=>setRows(r=>r.map((x,j)=>j===i?{...x,...patch}:x));
  const recalc=(i,avId)=>{
    const av=avrechim.find(a=>a.id===avId);
    const maxS=av?Number(av.maxStipend||1600):0;
    const calc=jbData?Math.round(rows[i].days/jbData.total_days*maxS):0;
    updRow(i,{avId,stipend:calc});
  };

  const doImport=()=>{
    setImporting(true);
    rows.filter(r=>!r.skip&&r.avId&&r.stipend>0).forEach(r=>{
      setAvMonthField(selKey,r.avId,'monthlyStipend',r.stipend);
    });
    setTimeout(()=>{ setImporting(false); onClose(); },800);
  };

  const matched   = rows.filter(r=>!r.skip&&r.avId).length;
  const unmatched = rows.filter(r=>!r.avId).length;
  const fromXLS   = jbData&&rows.length>0&&rows[0].jbSalary!==null;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:12}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:680,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"14px 18px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:16}}>📥 ייבוא נוכחות מ-JB</div>
            {jbData&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>
              תקופה: {jbData.period} | {jbData.total_days} ימי עבודה
              {fromXLS
                ? <span style={{marginRight:8,background:"#dcfce7",color:"#16a34a",borderRadius:6,padding:"1px 6px",fontWeight:600}}>✓ סכומים מדויקים מ-JB</span>
                : <span style={{marginRight:8,background:"#fef9c3",color:"#92400e",borderRadius:6,padding:"1px 6px"}}>חישוב לפי ימים</span>}
            </div>}
          </div>
          <button style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#64748b"}} onClick={onClose}>✕</button>
        </div>

        {!jbData?(
          /* Step 1: Load file */
          <div style={{padding:24,display:"flex",flexDirection:"column",gap:16}}>
            <div style={{background:"#f0f9ff",borderRadius:10,padding:14,fontSize:13,lineHeight:1.7}}>
              <div style={{fontWeight:700,marginBottom:6}}>הוראות:</div>
              <div>1️⃣ פתח שורת פקודה (cmd) והרץ:</div>
              <div style={{fontFamily:"monospace",background:"#1e293b",color:"#7dd3fc",padding:"6px 10px",borderRadius:6,margin:"4px 0",fontSize:12}}>
                python C:\JBCLOCK\jb_export.py 26 3
              </div>
              <div style={{fontSize:11,color:"#64748b"}}>(שנה את 26 3 לשנה ולחודש הרצויים)</div>
              <div style={{marginTop:6}}>2️⃣ לאחר הרצה — לחץ "טען קובץ" ובחר <strong>C:\JBCLOCK\jb_data.json</strong></div>
            </div>
            <label style={{...primaryBtn,textAlign:"center",cursor:"pointer",display:"block"}}>
              📂 טען קובץ jb_data.json
              <input type="file" accept=".json" style={{display:"none"}} onChange={loadFile}/>
            </label>
          </div>
        ):(
          <>
            {/* Step 2: Preview & edit */}
            <div style={{overflowY:"auto",flex:1}}>
              {unmatched>0&&(
                <div style={{margin:"8px 12px",background:"#fef2f2",borderRadius:8,padding:"7px 12px",fontSize:12,color:"#dc2626"}}>
                  ⚠️ {unmatched} עובדים לא זוהו — בחר אברך ידנית בשורות המסומנות
                </div>
              )}
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead style={{position:"sticky",top:0,background:"#f8fafc"}}>
                  <tr>
                    <th style={{...th,padding:"7px 8px"}}>שם JB</th>
                    <th style={{...th,padding:"7px 8px"}}>ימים</th>
                    <th style={{...th,padding:"7px 8px"}}>%</th>
                    <th style={{...th,padding:"7px 8px",minWidth:120}}>אברך במערכת</th>
                    <th style={{...th,padding:"7px 8px"}}>מגיע לו (₪)</th>
                    <th style={{...th,padding:"7px 8px"}}>דלג</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:r.skip?"#f8fafc":r.avId?"#fff":"#fef2f2",opacity:r.skip?0.45:1}}>
                      <td style={{...td,padding:"5px 8px",fontWeight:600}}>{r.jbName}</td>
                      <td style={{...td,padding:"5px 8px",textAlign:"center",color:"#475569"}}>{r.days}/{jbData.total_days}</td>
                      <td style={{...td,padding:"5px 8px",textAlign:"center",fontWeight:r.pct>=80?"700":"400",color:r.pct>=80?"#16a34a":r.pct>=50?"#d97706":"#dc2626"}}>{r.pct}%</td>
                      <td style={{...td,padding:"4px 6px"}}>
                        <select style={{...iinp,fontSize:11,color:r.avId?"#1e293b":"#dc2626"}}
                          value={r.avId||""}
                          onChange={e=>recalc(i,e.target.value?Number(e.target.value):null)}>
                          <option value="">-- לא מותאם --</option>
                          {avrechim.filter(a=>a.active).map(a=>(
                            <option key={a.id} value={a.id}>{a.name}</option>
                          ))}
                        </select>
                      </td>
                      <td style={{...td,padding:"4px 6px"}}>
                        <input style={{...iinp,textAlign:"left",width:70,color:r.avId?"#1e293b":"#94a3b8"}}
                          type="number" value={r.stipend}
                          onChange={e=>updRow(i,{stipend:Number(e.target.value)})}
                          disabled={!r.avId||r.skip}/>
                      </td>
                      <td style={{...td,padding:"4px 8px",textAlign:"center"}}>
                        <input type="checkbox" checked={r.skip} onChange={e=>updRow(i,{skip:e.target.checked})}/>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {/* Footer */}
            <div style={{padding:"12px 16px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,gap:10}}>
              <div style={{fontSize:13,color:"#475569"}}>
                <span style={{color:"#16a34a",fontWeight:700}}>{matched}</span> אברכים יוזנו
                {unmatched>0&&<span style={{color:"#dc2626",marginRight:8}}> | {unmatched} לא מותאמים</span>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={grayBtn} onClick={onClose}>ביטול</button>
                <button style={{...primaryBtn,width:"auto",padding:"9px 20px",opacity:matched===0||importing?0.6:1}}
                  disabled={matched===0||importing}
                  onClick={doImport}>
                  {importing?"מייבא...":"✅ ייבא "+matched+" אברכים"}
                </button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── AVRECHIM TAB ─────────────────────────────────────────────
function AvrechimTab({ avrechim, setAvrechim, selKey, prevKey, selYear, selMonth, getAV, getMD, setAvMonthField, calcAvrechMonth, totalOwed, attendance, customVacations, beinHazmanims, hiddenHols }){
  const [editId,setEditId]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [newAv,setNewAv]=useState({name:"",track:"1000",maxStipend:1600,incomeGroup:"datot"});
  const [search,setSearch]=useState("");
  const updAv=(id,k,v)=>setAvrechim(p=>p.map(a=>a.id===id?{...a,[k]:v}:a));
  const avNames = avrechim.map(a=>a.name).filter(Boolean);
  const filteredAvrechim = avrechim.filter(a=>a.active && a.name.includes(search));

  // תענית דיבור — תקופת השכר של JB: מ-15 בחודש הקודם עד 14 בחודש הנבחר (לא חודש קלנדרי!)
  const taanitPrevM = selMonth===0 ? 11 : selMonth-1;
  const taanitPrevY = selMonth===0 ? selYear-1 : selYear;
  const taanitPeriodStart = new Date(taanitPrevY, taanitPrevM, 15);
  const taanitPeriodEnd   = new Date(selYear, selMonth, 14);
  const taanitPeriodLabel = `15/${String(taanitPrevM+1).padStart(2,"0")}-14/${String(selMonth+1).padStart(2,"0")}`;

  const forEachTaanitDay = fn => {
    let d = new Date(taanitPeriodStart);
    while(d<=taanitPeriodEnd){
      const y=d.getFullYear(), m=d.getMonth(), da=d.getDate();
      const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(da).padStart(2,"0")}`;
      fn(dateStr, mkMonthKey(y,m));
      d.setDate(d.getDate()+1);
    }
  };

  // "כל החודש" (כל ימי הלימוד בתקופה) ו"לפי נוכחות" (הימים שסומנו בפועל לאברך, גם אם חוצה שני חודשים קלנדריים)
  let monthLearningDays = 0;
  forEachTaanitDay(dateStr=>{ if(getDayType(dateStr,customVacations,beinHazmanims,hiddenHols).type==="learning") monthLearningDays++; });

  const avAttendanceDays = av => {
    let count=0;
    forEachTaanitDay((dateStr,monthKeyForDate)=>{
      if((attendance[monthKeyForDate]||{})[String(av.id)]?.[dateStr]==="1") count++;
    });
    return count;
  };

  // "הכניס סריקוב" — לפי מה שמוזן בראשי ב"נשלח לאברכים" (לא לפי מסלול קבוע):
  // אם רק שדה אחד מתוך sent2000/sent1000/sentKeren לא-אפס — כולם קיבלו את אותו סכום החודש.
  // אם כמה שדות מלאים בו-זמנית (חודש מעורב) — משתמשים במסלול/קבוצה של כל אברך.
  const sent2000 = Number(getMD(selKey,"sent2000"))||0;
  const sent1000 = Number(getMD(selKey,"sent1000"))||0;
  const sentKeren = Number(getMD(selKey,"sentKeren"))||0;
  const filledSentFields = [sent2000,sent1000,sentKeren].filter(n=>n>0).length;
  const applySarikowGivenToAll = () => {
    avrechim.filter(a=>a.active).forEach(av=>{
      const isKerenGroup = (av.incomeGroup||(av.track==="keren"?"keren":"datot"))==="keren";
      let amt;
      if(filledSentFields<=1){
        amt = sent2000>0 ? 2000 : (sent1000>0||sentKeren>0) ? 1000 : null;
      } else {
        amt = isKerenGroup ? 1000 : (Number(av.track)||1000);
      }
      if(amt!=null) setAvMonthField(selKey,av.id,"sarikowGiven",amt);
    });
  };

  return (
    <div style={col}>
      <div style={{background:"linear-gradient(135deg,#3b0764,#7c3aed)",borderRadius:12,padding:"14px 16px",color:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:13,opacity:.8}}>סה״כ חוב לאברכים החודש</div>
        <div style={{fontSize:34,fontWeight:800}}>{fmt(totalOwed)} ₪</div>
        <div style={{fontSize:11,opacity:.7,marginTop:3}}>כולל פערים מחודש קודם</div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <div style={{fontWeight:700,fontSize:14,color:"#475569"}}>רשימת אברכים</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button style={{...addBtn,background:"#f0fdf4",color:"#16a34a",border:"1px solid #86efac"}}
            onClick={()=>setShowImport(true)}>📥 ייבוא JB</button>
          <button style={{...addBtn,background:"#fefce8",color:"#92400e",border:"1px solid #fde68a"}}
            onClick={()=>{ if(window.confirm("זה יעדכן את שמות וסדר האברכים לרשימה הראשית. להמשיך?")) setAvrechim(defaultAvrechim); }}>
            🔄 עדכן שמות
          </button>
          <button style={addBtn} onClick={()=>setShowAdd(true)}>+ הוסף אברך</button>
        </div>
      </div>

      {(sent2000>0||sent1000>0||sentKeren>0) && (
        <div style={{background:"#f5f3ff",border:"1.5px solid #c4b5fd",borderRadius:10,padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{fontSize:11,color:"#5b21b6"}}>
            לפי "נשלח לאברכים" בראשי:
            {sent2000>0&&` ${sent2000}×2,000`}
            {sent1000>0&&` | ${sent1000}×1,000`}
            {sentKeren>0&&` | ${sentKeren}×1,000 (קרן)`}
          </div>
          <button style={{...smallBtn,background:"#7c3aed",color:"#fff",fontWeight:700}}
            onClick={()=>{ if(window.confirm("זה ימלא את שדה \"הכניס סריקוב\" לכל האברכים הפעילים לפי הסכומים שהוזנו בראשי. אפשר עדיין לשנות ידנית לאברך ספציפי אחרי כן. להמשיך?")) applySarikowGivenToAll(); }}>
            🔄 החל על כולם
          </button>
        </div>
      )}
      {showImport&&<ImportModal avrechim={avrechim} selKey={selKey} setAvMonthField={setAvMonthField} onClose={()=>setShowImport(false)}/>}

      <div style={{position:"relative"}}>
        <input
          style={{...inp,paddingRight:34,width:"100%"}}
          placeholder="🔍 חיפוש אברך..."
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16}}>✕</button>}
      </div>

      <datalist id="avrech-names-list">
        {avNames.map((n,i)=><option key={i} value={n}/>)}
      </datalist>

      {filteredAvrechim.map(av=>{
        const c=calcAvrechMonth(av,selKey,prevKey);
        const isEdit=editId===av.id;
        const maxS=Number(av.maxStipend||1600);
        return (
          <div key={av.id} style={{...card,borderRight:`4px solid ${trackColor[av.track]}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                {isEdit
                  ? <input style={iinp} list="avrech-names-list" value={av.name} onChange={e=>updAv(av.id,"name",e.target.value)}/>
                  : <span style={{fontWeight:700,fontSize:15}}>{av.name}</span>}
                <span style={{fontSize:11,color:"#fff",borderRadius:20,padding:"2px 8px",fontWeight:600,background:trackColor[av.track]||"#64748b"}}>{trackLabel[av.track]}</span>
                <span style={{fontSize:11,color:"#fff",borderRadius:20,padding:"2px 8px",fontWeight:600,background:groupColor[c.incomeGroup]||"#64748b"}}>{groupLabel[c.incomeGroup]||"—"}</span>
                <span style={{fontSize:11,color:"#94a3b8"}}>מקס׳ {fmt(maxS)} ₪</span>
              </div>
              <div style={{display:"flex",gap:5}}>
                <button style={smallBtn} onClick={()=>setEditId(isEdit?null:av.id)}>{isEdit?"✓":"✏️"}</button>
                <button style={{...smallBtn,background:"#fee2e2",color:"#dc2626"}} onClick={()=>updAv(av.id,"active",false)}>✕</button>
              </div>
            </div>

            {isEdit && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:8}}>
                <FG label="מסלול">
                  <select style={inp} value={av.track} onChange={e=>updAv(av.id,"track",e.target.value)}>
                    <option value="2000">2,000 ₪</option>
                    <option value="1000">1,000 ₪</option>
                  </select>
                </FG>
                <FG label="קבוצת הכנסה">
                  <select style={inp} value={av.incomeGroup||(av.track==="keren"?"keren":"datot")} onChange={e=>updAv(av.id,"incomeGroup",e.target.value)}>
                    <option value="datot">זכאי דתות</option>
                    <option value="keren">מושהה קרן</option>
                  </select>
                </FG>
                <FG label="מלגה מקסימום (₪)">
                  <input style={inp} type="number" value={maxS} onChange={e=>updAv(av.id,"maxStipend",e.target.value)}/>
                </FG>
              </div>
            )}

            {/* שדות חודשיים */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginTop:10}}>
              <AvF label="💰 מגיע לו" val={getAV(selKey,av.id,"monthlyStipend")} onChange={v=>setAvMonthField(selKey,av.id,"monthlyStipend",v)} placeholder={`עד ${fmt(maxS)}`} hi />
              <AvF label="🎓 בחינות"  val={getAV(selKey,av.id,"exams")}           onChange={v=>setAvMonthField(selKey,av.id,"exams",v)} />
              <AvF label="💵 הכניס סריקוב" val={getAV(selKey,av.id,"sarikowGiven")} onChange={v=>setAvMonthField(selKey,av.id,"sarikowGiven",v)} placeholder={`${fmt(c.trackNum)}`} />
            </div>
            {/* תענית דיבור */}
            <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:8,padding:"8px 10px",marginTop:6}}>
              <div style={{fontWeight:700,fontSize:12,color:"#0369a1",marginBottom:6}}>🤫 תענית דיבור — 15 ₪ ליום</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,alignItems:"center"}}>
                <div>
                  <label style={{fontSize:11,color:"#0369a1",display:"block",marginBottom:3}}>מספר ימים</label>
                  <input
                    type="number" min="0"
                    value={getAV(selKey,av.id,"taanitDays")}
                    placeholder="0"
                    onChange={e=>setAvMonthField(selKey,av.id,"taanitDays",e.target.value)}
                    style={{border:"1.5px solid #7dd3fc",borderRadius:6,padding:"6px 8px",fontSize:13,width:"100%",boxSizing:"border-box",background:"#fff"}}
                  />
                  <div style={{display:"flex",gap:4,marginTop:4}}>
                    <button type="button" style={{...smallBtn,fontSize:10,padding:"3px 6px",flex:1}}
                      onClick={()=>setAvMonthField(selKey,av.id,"taanitDays",monthLearningDays)}
                      title={`ממלא את כל ימי הלימוד בתקופה ${taanitPeriodLabel}`}>
                      📅 כל התקופה ({monthLearningDays})
                    </button>
                    <button type="button" style={{...smallBtn,fontSize:10,padding:"3px 6px",flex:1}}
                      onClick={()=>setAvMonthField(selKey,av.id,"taanitDays",avAttendanceDays(av))}
                      title={`ממלא לפי נוכחות בתקופה ${taanitPeriodLabel}`}>
                      ✓ לפי נוכחות ({avAttendanceDays(av)})
                    </button>
                  </div>
                  <div style={{fontSize:9,color:"#94a3b8",marginTop:2,textAlign:"center"}}>תקופה: {taanitPeriodLabel}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  {c.taanitDays>0 ? (
                    <>
                      <div style={{fontSize:11,color:"#0369a1"}}>סה״כ מזומן</div>
                      <div style={{fontSize:18,fontWeight:800,color:"#0369a1"}}>{fmt(c.taanitAmount)} ₪</div>
                      <div style={{fontSize:10,color:"#64748b"}}>{c.taanitDays} ימים × 15 ₪</div>
                    </>
                  ) : (
                    <div style={{fontSize:11,color:"#94a3b8"}}>הזן ימים לחישוב</div>
                  )}
                </div>
              </div>
              {c.taanitDays>0&&(
                <div style={{marginTop:8,paddingTop:6,borderTop:"1px solid #bae6fd",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#0369a1",fontWeight:600}}>💵 קיבל במזומן?</span>
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                    background:getAV(selKey,av.id,"taanitPaid")==="1"?"#0369a1":"#f1f5f9",
                    border:`2px solid ${getAV(selKey,av.id,"taanitPaid")==="1"?"#0369a1":"#cbd5e1"}`,
                    borderRadius:7,padding:"4px 12px",fontSize:12,fontWeight:600,
                    color:getAV(selKey,av.id,"taanitPaid")==="1"?"#fff":"#64748b",transition:"all .2s",userSelect:"none"}}>
                    <input type="checkbox"
                      checked={getAV(selKey,av.id,"taanitPaid")==="1"}
                      onChange={e=>setAvMonthField(selKey,av.id,"taanitPaid",e.target.checked?"1":"")}
                      style={{width:14,height:14,cursor:"pointer",accentColor:"#0369a1"}}/>
                    {getAV(selKey,av.id,"taanitPaid")==="1"?"✓ קיבל":"סמן קיבל"}
                  </label>
                </div>
              )}
            </div>

            {/* הכנסה + עיגול — תיבה משולבת */}
            <div style={{background:c.incomeGroup==="datot"?"#fffbeb":"#f0fdf4",borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                {/* שורת הכנסה */}
                <span style={{color:groupColor[c.incomeGroup]||"#64748b",fontWeight:700}}>
                  {c.incomeGroup==="datot"
                    ? `🏛️ דתות: ${fmt(c.datot)} ₪ (${fmt(c.totalDatot)} ÷ ${c.datotCount})`
                    : `📚 קרן: ${fmt(c.keren)} ₪ (${fmt(c.totalKeren)} ÷ ${c.kerenCount})`}
                </span>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  {(c.datotRaw!==""||c.kerenRaw!=="")
                    ? <span style={{color:"#dc2626",fontSize:10}}>⚠️ עקיפה</span>
                    : <span style={{color:"#94a3b8",fontSize:10}}>אוטו׳</span>}
                  <button style={{...smallBtn,fontSize:10,padding:"2px 6px"}}
                    onClick={()=>{setAvMonthField(selKey,av.id,"datot","");setAvMonthField(selKey,av.id,"keren","");}}>↺ אפס</button>
                  <button style={{...smallBtn,fontSize:10,padding:"2px 6px",background:"#fef3c7"}}
                    onClick={()=>{
                      if(c.incomeGroup==="datot") setAvMonthField(selKey,av.id,"datot",c.autoDatot);
                      else setAvMonthField(selKey,av.id,"keren",c.autoKeren);
                    }}>✏️ עקוף</button>
                </div>
              </div>

              {/* שדה עקיפה ידנית */}
              {(c.datotRaw!==""||c.kerenRaw!=="") && (
                <div style={{marginTop:6}}>
                  {c.incomeGroup==="datot"
                    ? <AvF label="🏛️ דתות ידני (₪)" val={getAV(selKey,av.id,"datot")} onChange={v=>setAvMonthField(selKey,av.id,"datot",v)} />
                    : <AvF label="📚 קרן ידני (₪)"   val={getAV(selKey,av.id,"keren")} onChange={v=>setAvMonthField(selKey,av.id,"keren",v)} />}
                </div>
              )}

              {/* עיגול סריקוב */}
              <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:"#1d4ed8",fontWeight:600}}>⚖️ עיגול סריקוב מהקופה:</span>
                <span style={{color:"#1e293b",fontWeight:700,fontSize:13}}>
                  {c.incomeGroup==="datot"
                    ? `${fmt(c.sarikowGiven)} − ${fmt(c.datot)} = `
                    : `${fmt(c.sarikowGiven)} − ${fmt(c.keren)} = `}
                  <span style={{color:"#2563eb",fontSize:14}}>{fmt(c.rounding)} ₪</span>
                </span>
              </div>
            </div>

            {/* נוסחת בנק — מוצגת רק כשיש ערך */}
            {c.monthly>0 && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-around",background:"#f8fafc",borderRadius:8,padding:"8px 4px",marginTop:8,gap:4,flexWrap:"wrap"}}>
                <CI l="מגיע לו"  v={c.monthly} />
                <span style={{color:"#94a3b8"}}>−</span>
                <CI l="מהקופה (סריקוב)" v={c.kupaPortion} />
                {c.exams>0&&<><span style={{color:"#94a3b8"}}>+</span><CI l="בחינות" v={c.exams}/></>}
                {c.prevBankGap!==0&&<><span style={{color:"#94a3b8"}}>{c.prevBankGap>0?"+":"−"}</span><CI l="פער קודם" v={Math.abs(c.prevBankGap)}/></>}
                {c.holiday>0&&<><span style={{color:"#94a3b8"}}>+</span><CI l="🎉 חג" v={c.holiday} color="#b45309"/></>}
                {c.depositRounding>0&&<><span style={{color:"#94a3b8"}}>+</span><CI l="⭕ עיגול" v={c.depositRounding} color="#7c3aed"/></>}
                <span style={{color:"#94a3b8"}}>=</span>
                <CI l="🏦 לבנק" v={c.totalToBank} bold color={c.totalToBank>=0?"#16a34a":"#dc2626"} />
              </div>
            )}

            {/* חג ועיגול הפקדה */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <AvF label="🎉 חג (₪)" val={getAV(selKey,av.id,"holiday")} onChange={v=>setAvMonthField(selKey,av.id,"holiday",v)} />
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                <label style={{fontSize:10,color:"#7c3aed",fontWeight:700}}>⭕ עיגול הפקדה (₪)</label>
                <div style={{display:"flex",gap:4}}>
                  <input style={{border:"1px solid #c4b5fd",borderRadius:6,padding:"5px 6px",fontSize:12,flex:1,minWidth:0,boxSizing:"border-box"}}
                    type="number" value={getAV(selKey,av.id,"depositRounding")} placeholder="0"
                    onChange={e=>setAvMonthField(selKey,av.id,"depositRounding",e.target.value)}/>
                  <button style={{...smallBtn,background:"#ede9fe",color:"#7c3aed",border:"1px solid #c4b5fd",whiteSpace:"nowrap",padding:"3px 7px",fontSize:11}}
                    onClick={()=>{
                      const base=c.effectiveBank+(Number(getAV(selKey,av.id,"holiday"))||0);
                      const rounded=Math.ceil(base/10)*10;
                      setAvMonthField(selKey,av.id,"depositRounding",rounded-base>0?rounded-base:0);
                    }}>עגל↑10</button>
                </div>
              </div>
            </div>
            {c.totalToBank>0&&(
              <div style={{background:"#ecfdf5",border:"1.5px solid #34d399",borderRadius:8,padding:"7px 12px",marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#059669",fontWeight:700}}>💰 סה״כ להפקדה:</span>
                <span style={{fontSize:16,fontWeight:800,color:"#059669"}}>{fmt(c.totalToBank)} ₪</span>
              </div>
            )}
            {c.totalToBank<0&&(
              <div style={{background:"#fef2f2",border:"1.5px solid #f87171",borderRadius:8,padding:"7px 12px",marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#dc2626",fontWeight:700}}>⚠️ האברך צריך להחזיר:</span>
                <span style={{fontSize:16,fontWeight:800,color:"#dc2626"}}>{fmt(Math.abs(c.totalToBank))} ₪</span>
              </div>
            )}

            {/* פיצול בנק / מזומן */}
            {c.totalToBank>0&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:6}}>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  <label style={{fontSize:10,color:"#0369a1",fontWeight:700}}>🏦 הפקדה לבנק (₪)</label>
                  <input style={{border:`2px solid ${getAV(selKey,av.id,"bankDeposit")!==""?"#f59e0b":"#7dd3fc"}`,borderRadius:6,padding:"5px 6px",fontSize:12,width:"100%",boxSizing:"border-box"}}
                    type="number"
                    value={getAV(selKey,av.id,"bankDeposit")!==""?getAV(selKey,av.id,"bankDeposit"):(c.totalToBank||"")}
                    onChange={e=>setAvMonthField(selKey,av.id,"bankDeposit",e.target.value)}/>
                </div>
                <div style={{background:c.cashAmount>0?"#fefce8":"#f8fafc",border:`1.5px solid ${c.cashAmount>0?"#fde047":"#e2e8f0"}`,borderRadius:8,padding:"6px 10px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                  <span style={{fontSize:10,color:"#92400e",fontWeight:700}}>💵 מזומן</span>
                  <span style={{fontSize:16,fontWeight:800,color:c.cashAmount>0?"#b45309":"#94a3b8"}}>
                    {c.cashAmount>0?fmt(c.cashAmount)+" ₪":"—"}
                  </span>
                </div>
              </div>
            )}

            {/* הכנסתי בפועל + פער — תמיד מוצג */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                <label style={{fontSize:10,color:"#059669",fontWeight:700}}>
                  🏦 הכנסתי לבנק (₪)
                  {getAV(selKey,av.id,"actualBank")===""&&c.totalToBank>0&&<span style={{color:"#94a3b8",fontWeight:400}}> — אוטו׳</span>}
                </label>
                <input
                  style={{border:`2px solid ${getAV(selKey,av.id,"actualBank")!==""?"#f59e0b":"#34d399"}`,borderRadius:6,padding:"5px 6px",fontSize:12,width:"100%",boxSizing:"border-box"}}
                  type="number"
                  value={getAV(selKey,av.id,"actualBank")!==""?getAV(selKey,av.id,"actualBank"):(c.bankDeposit||"")}
                  onChange={e=>{
                    const v=e.target.value;
                    setAvMonthField(selKey,av.id,"actualBank",v);
                    const actual=v!==""?Number(v):null;
                    if(actual!==null){
                      setAvMonthField(selKey,av.id,"bankGap",c.effectiveBank-(actual+c.cashAmount-c.holiday-c.depositRounding));
                    }
                  }}
                />
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                <label style={{fontSize:10,color:c.bankGap>0?"#dc2626":c.bankGap<0?"#2563eb":"#64748b",fontWeight:700}}>
                  {c.bankGap>0?"⬆️ חייב לו (לחודש הבא)":c.bankGap<0?"⬇️ שילמתי יותר (לנכות)":"↔️ פער לחודש הבא"}
                </label>
                <input
                  style={{border:`2px solid ${c.bankGap>0?"#fca5a5":c.bankGap<0?"#93c5fd":"#e2e8f0"}`,borderRadius:6,padding:"5px 6px",fontSize:12,width:"100%",boxSizing:"border-box"}}
                  type="number" value={getAV(selKey,av.id,"bankGap")} placeholder="0"
                  onChange={e=>setAvMonthField(selKey,av.id,"bankGap",e.target.value)}
                />
              </div>
            </div>

            {/* הודעת פער */}
            {getAV(selKey,av.id,"actualBank")!==""&&c.bankGap!==0&&(
              <div style={{background:c.bankGap>0?"#fef2f2":"#eff6ff",borderRadius:8,padding:"5px 10px",marginTop:4,fontSize:12}}>
                <span style={{color:c.bankGap>0?"#dc2626":"#2563eb",fontWeight:600}}>
                  {c.bankGap>0
                    ? `⬆️ חסר ${fmt(c.bankGap)} ₪ — יתווסף לחישוב בנק חודש הבא`
                    : `⬇️ שולם ${fmt(Math.abs(c.bankGap))} ₪ יותר — יקוזז מבנק חודש הבא`}
                </span>
              </div>
            )}
          </div>
        );
      })}

      {avrechim.some(a=>!a.active)&&(
        <div style={card}>
          <div style={{fontWeight:700,color:"#94a3b8",marginBottom:6}}>לא פעילים</div>
          {avrechim.filter(a=>!a.active).map(av=>(
            <div key={av.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",color:"#94a3b8"}}>
              <span>{av.name}</span>
              <button style={smallBtn} onClick={()=>updAv(av.id,"active",true)}>שחזר</button>
            </div>
          ))}
        </div>
      )}

      {showAdd&&(
        <Modal title="הוספת אברך חדש" onClose={()=>setShowAdd(false)}>
          <FG label="שם"><input style={inp} list="avrech-names-list" value={newAv.name} onChange={e=>setNewAv(p=>({...p,name:e.target.value}))} placeholder="שם האברך"/></FG>
          <FG label="מסלול">
            <select style={inp} value={newAv.track} onChange={e=>setNewAv(p=>({...p,track:e.target.value}))}>
              <option value="2000">2,000 ₪</option>
              <option value="1000">1,000 ₪</option>
            </select>
          </FG>
          <FG label="קבוצת הכנסה">
            <select style={inp} value={newAv.incomeGroup||"datot"} onChange={e=>setNewAv(p=>({...p,incomeGroup:e.target.value}))}>
              <option value="datot">זכאי דתות</option>
              <option value="keren">מושהה קרן</option>
            </select>
          </FG>
          <FG label="מלגה מקסימום (₪)">
            <input style={inp} type="number" value={newAv.maxStipend} onChange={e=>setNewAv(p=>({...p,maxStipend:e.target.value}))} placeholder="1600"/>
          </FG>
          <button style={primaryBtn} onClick={()=>{
            if(!newAv.name) return;
            setAvrechim(p=>[...p,{...newAv,id:Date.now(),active:true,incomeGroup:newAv.incomeGroup||"datot"}]);
            setNewAv({name:"",track:"1000",maxStipend:1600,incomeGroup:"datot"});
            setShowAdd(false);
          }}>הוסף אברך</button>
        </Modal>
      )}
    </div>
  );
}

// ── SUMMARY TAB ──────────────────────────────────────────────
function SummaryTab({ avrechim, allMonthKeys, calcMonthTotals, calcAvrechMonth, getPrevMonthKey, baseBalance, liveBalance, selKey, allMonths, getMD, setMonthField }){
  const [openMonth,setOpenMonth]=useState(selKey);
  const [pendingInput,setPendingInput]=useState({}); // { "monthKey|datot": "1234", ... }
  const baseMonthKey = baseBalance.monthKey || "0000-00";
  const calcCumBalance = (upToKey) => {
    let sum = Number(baseBalance.amount||0);
    allMonthKeys.filter(k=>k>=baseMonthKey&&k<=upToKey).forEach(k=>{ sum+=calcMonthTotals(k).net; });
    return sum;
  };

  // ── חודשים ממתינים להעברת דתות/קרן ──
  const isKerenGroup = a => (a.incomeGroup||(a.track==="keren"?"keren":"datot"))==="keren";
  const datotAvrechim = avrechim.filter(a=>a.active && !isKerenGroup(a));
  const kerenAvrechim  = avrechim.filter(a=>a.active && isKerenGroup(a));

  const pendingRows = allMonthKeys.map(key=>{
    const prevK = getPrevMonthKey(key);
    const datotPaid = datotAvrechim.reduce((s,av)=>s+calcAvrechMonth(av,key,prevK).monthly,0);
    const kerenPaid = kerenAvrechim.reduce((s,av)=>s+calcAvrechMonth(av,key,prevK).monthly,0);
    const datotPending = datotPaid>0 && Number(getMD(key,"datot"))===0;
    const kerenPending = kerenPaid>0 && Number(getMD(key,"keren"))===0;
    return { key, datotPending, kerenPending, datotPaid, kerenPaid };
  }).filter(r=>r.datotPending||r.kerenPending).reverse();

  const confirmPending = (key,field,val) => {
    const n = Number(val)||0;
    if(n<=0) return;
    setMonthField(key,field,n);
    setMonthField(key,field+"Confirmed",n);
    setPendingInput(p=>({...p,[key+"|"+field]:""}));
  };

  return (
    <div style={col}>
      <div style={{background:"linear-gradient(135deg,#0f2044,#1d4ed8)",borderRadius:12,padding:"14px 16px",color:"#fff"}}>
        <div style={{fontSize:13,opacity:.75}}>יתרה חיה מצטברת</div>
        <div style={{fontSize:32,fontWeight:800}}>{fmt(liveBalance)} ₪</div>
        <div style={{fontSize:12,opacity:.7,marginTop:4}}>בסיס {fmt(baseBalance.amount)} ₪ (נכון ל-{baseBalance.date}) + סיכום כל החודשים</div>
      </div>

      {pendingRows.length>0 && (
        <div style={{...card,border:"1.5px solid #f59e0b",background:"#fffbeb"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:"#92400e"}}>⏳ חודשים ממתינים להעברת דתות/קרן</div>
          <div style={{fontSize:11,color:"#78716c",marginBottom:10}}>האברכים כבר קיבלו את הכסף מהקופה — אבל טרם הוזנה העברה מדתות/קרן עבור החודשים האלה. כשמתקבל הרטרו, הזן כאן את הסכום המדויק לכל חודש.</div>
          {pendingRows.map(r=>{
            const [y,m]=r.key.split("-");
            const label=mkMonthLabel(Number(y),Number(m)-1);
            return (
              <div key={r.key} style={{background:"#fff",borderRadius:8,padding:"8px 10px",marginBottom:6,border:"1px solid #fde68a"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{label}</div>
                {r.datotPending && (
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:r.kerenPending?6:0}}>
                    <span style={{fontSize:11,color:"#b45309",whiteSpace:"nowrap"}}>🏛️ דתות (שולם {fmt(r.datotPaid)} ₪):</span>
                    <input style={{...iinp,textAlign:"left",flex:1}} type="number" placeholder="סכום שהתקבל"
                      value={pendingInput[r.key+"|datot"]||""}
                      onChange={e=>setPendingInput(p=>({...p,[r.key+"|datot"]:e.target.value}))} />
                    <button style={{...smallBtn,background:"#16a34a",color:"#fff"}}
                      onClick={()=>confirmPending(r.key,"datot",pendingInput[r.key+"|datot"])}>אשר קבלה</button>
                  </div>
                )}
                {r.kerenPending && (
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:"#059669",whiteSpace:"nowrap"}}>📚 קרן (שולם {fmt(r.kerenPaid)} ₪):</span>
                    <input style={{...iinp,textAlign:"left",flex:1}} type="number" placeholder="סכום שהתקבל"
                      value={pendingInput[r.key+"|keren"]||""}
                      onChange={e=>setPendingInput(p=>({...p,[r.key+"|keren"]:e.target.value}))} />
                    <button style={{...smallBtn,background:"#16a34a",color:"#fff"}}
                      onClick={()=>confirmPending(r.key,"keren",pendingInput[r.key+"|keren"])}>אשר קבלה</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {allMonthKeys.length===0 && <div style={{...card,...{color:"#94a3b8",textAlign:"center"}}}>אין נתונים עדיין</div>}

      {[...allMonthKeys].reverse().map(key=>{
        const t=calcMonthTotals(key);
        const prevK=getPrevMonthKey(key);
        const isOpen=openMonth===key;
        const [y,m]=key.split("-");
        const label=mkMonthLabel(Number(y),Number(m)-1);
        return (
          <div key={key} style={card}>
            <button onClick={()=>setOpenMonth(isOpen?null:key)} style={{background:"none",border:"none",cursor:"pointer",width:"100%",textAlign:"right",display:"flex",justifyContent:"space-between",alignItems:"center",padding:0}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontWeight:700,fontSize:14}}>{label}</span>
                <span style={{fontSize:12,color:t.net>=0?"#16a34a":"#dc2626",fontWeight:600}}>{fmtSigned(t.net)} ₪ נטו</span>
              </div>
              <span style={{color:"#94a3b8"}}>{isOpen?"▲":"▼"}</span>
            </button>

            {isOpen && (
              <div style={{marginTop:12}}>
                <MR l="תורמים"       v={t.donors} />
                <MR l="דתות"         v={t.datot} />
                <MR l="קרן התורה"    v={t.keren} />
                <MR l="סה״כ הכנסות" v={t.income} bold />
                <div style={divider}/>
                <MR l="קיזוז עיגול"  v={-t.totalRounding} neg />
                <MR l="נשלח"         v={-t.sent} neg />
                <div style={divider}/>
                <MR l="נטו חודש" v={t.net} bold color={t.net>=0?"#16a34a":"#dc2626"} />
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#eff6ff",borderRadius:8,padding:"8px 12px",marginTop:8,border:"1.5px solid #bfdbfe"}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#1d4ed8"}}>💰 יתרה כוללת עד חודש זה</span>
                  <span style={{fontWeight:800,fontSize:18,color:"#1d4ed8"}}>{fmt(calcCumBalance(key))} ₪</span>
                </div>
                {allMonths[key]?.summaryDate && (
                  <div style={{fontSize:11,color:"#166534",textAlign:"center",marginTop:4,background:"#bbf7d0",borderRadius:8,padding:"3px 8px"}}>
                    📅 תאריך פגישה: {allMonths[key].summaryDate.split("-").reverse().join("/")}
                  </div>
                )}

                {/* Per-avrech table */}
                <div style={{marginTop:12,fontSize:13,fontWeight:700,color:"#475569",marginBottom:6}}>פירוט אברכים:</div>
                <table style={tbl}>
                  <thead>
                    <tr>
                      <th style={th}>שם</th>
                      <th style={th}>מגיע</th>
                      <th style={th}>עיגול</th>
                      <th style={th}>בחינות</th>
                      <th style={th}>פער קודם</th>
                      <th style={th}>🏦 לבנק</th>
                      <th style={th}>הוכנס</th>
                      <th style={th}>פער</th>
                    </tr>
                  </thead>
                  <tbody>
                    {avrechim.filter(a=>a.active).map(av=>{
                      const c=calcAvrechMonth(av,key,prevK);
                      if(c.monthly===0) return null;
                      return (
                        <tr key={av.id} style={{borderBottom:"1px solid #f1f5f9",borderRight:`3px solid ${trackColor[av.track]}`}}>
                          <td style={td}>{av.name}</td>
                          <td style={td}>{fmt(c.monthly)}</td>
                          <td style={td}>{c.rounding>0?fmt(c.rounding):"—"}</td>
                          <td style={td}>{c.exams>0?fmt(c.exams):"—"}</td>
                          <td style={{...td,color:c.prevBankGap>0?"#dc2626":c.prevBankGap<0?"#2563eb":"#94a3b8"}}>{c.prevBankGap!==0?fmtSigned(c.prevBankGap):"—"}</td>
                          <td style={{...td,fontWeight:700,color:c.effectiveBank>=0?"#16a34a":"#dc2626"}}>{fmt(c.effectiveBank)}</td>
                          <td style={td}>{c.actualBank!==null?fmt(c.actualBank):"—"}</td>
                          <td style={{...td,color:c.bankGap>0?"#dc2626":c.bankGap<0?"#2563eb":"#94a3b8"}}>{c.actualBank!==null?(c.bankGap!==0?fmtSigned(c.bankGap):"✓"):"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── BANK TAB ─────────────────────────────────────────────────
function BankTab({ avrechim, selKey, prevKey, calcAvrechMonth, selYear, selMonth, getAV, setAvMonthField }){
  const [expanded, setExpanded] = React.useState(false);

  const deposits = avrechim
    .filter(a=>a.active)
    .map(av=>({ av, c:calcAvrechMonth(av,selKey,prevKey) }))
    .filter(({c})=>c.monthly>0||c.holiday>0||c.totalToBank>0);

  const cashList = deposits.filter(({c})=>c.cashAmount>0 && c.taanitAmount===0);

  // אברכים שצריכים להחזיר
  const owingList = avrechim.filter(a=>a.active).map(av=>({ av, c:calcAvrechMonth(av,selKey,prevKey) })).filter(({c})=>c.totalToBank<0);
  const totalOwing = owingList.reduce((s,{c})=>s+Math.abs(c.totalToBank),0);
  const owingPaidCount = owingList.filter(({av})=>getAV(selKey,av.id,"refundReceived")==="1").length;
  const allOwingPaid   = owingPaidCount===owingList.length && owingList.length>0;

  // תענית דיבור
  const taanitList       = avrechim.filter(a=>a.active).map(av=>({ av, c:calcAvrechMonth(av,selKey,prevKey) })).filter(({c})=>c.taanitAmount>0);
  const totalTaanit      = taanitList.reduce((s,{c})=>s+c.taanitAmount,0);
  const taanitPaidCount  = taanitList.filter(({av})=>getAV(selKey,av.id,"taanitPaid")==="1").length;
  const taanitPaidTotal  = taanitList.filter(({av})=>getAV(selKey,av.id,"taanitPaid")==="1").reduce((s,{c})=>s+c.taanitAmount,0);
  const allTaanitPaid    = taanitPaidCount===taanitList.length && taanitList.length>0;

  // סיכומי בנק
  const totalDeposit   = deposits.reduce((s,{c})=>s+c.totalToBank,0);
  const totalBankXfer  = deposits.reduce((s,{c})=>s+c.bankDeposit,0);  // בנק בלבד
  const totalCash      = cashList.reduce((s,{c})=>s+c.cashAmount,0);   // מזומן בלבד
  const totalRounding  = deposits.reduce((s,{c})=>s+c.depositRounding,0); // עיגול סריקוב
  const grandTotal     = totalBankXfer + totalCash;

  // העברות בנק
  const totalCount     = deposits.length;
  const sentCount      = deposits.filter(({av})=>getAV(selKey,av.id,"bankRequested")==="1").length;
  const sentTotal      = deposits.filter(({av})=>getAV(selKey,av.id,"bankRequested")==="1")
                                 .reduce((s,{c})=>s+c.bankDeposit,0);
  const pendingBank    = totalBankXfer - sentTotal;
  const allSent        = sentCount===totalCount && totalCount>0;

  // מזומן
  const cashPaidCount  = cashList.filter(({av})=>getAV(selKey,av.id,"cashPaid")==="1").length;
  const cashPaidTotal  = cashList.filter(({av})=>getAV(selKey,av.id,"cashPaid")==="1")
                                 .reduce((s,{c})=>s+c.cashAmount,0);
  const allCashPaid    = cashPaidCount===cashList.length && cashList.length>0;

  const rowS = {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",
                borderBottom:"1px solid #f1f5f9",fontSize:13};

  return (
    <div style={col}>

      {/* ── כרטיס סיכום כולל ── */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)",borderRadius:12,padding:"16px",color:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.18)"}}>
        <div style={{fontSize:12,opacity:.75,marginBottom:4}}>סה״כ תשלומים — {mkMonthLabel(selYear,selMonth)}</div>
        <div style={{fontSize:36,fontWeight:800,marginBottom:8}}>{fmt(grandTotal)} ₪</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <div style={{background:"rgba(255,255,255,.13)",borderRadius:8,padding:"6px 10px"}}>
            <div style={{fontSize:10,opacity:.75}}>🏦 העברות לבנק</div>
            <div style={{fontWeight:700,fontSize:15}}>{fmt(totalBankXfer)} ₪</div>
          </div>
          <div style={{background:"rgba(255,255,255,.13)",borderRadius:8,padding:"6px 10px"}}>
            <div style={{fontSize:10,opacity:.75}}>💵 מזומן</div>
            <div style={{fontWeight:700,fontSize:15}}>{fmt(totalCash)} ₪</div>
          </div>
          {totalTaanit>0&&(
            <div style={{background:"rgba(255,255,255,.13)",borderRadius:8,padding:"6px 10px",gridColumn:"1/-1"}}>
              <div style={{fontSize:10,opacity:.75}}>🤫 תענית דיבור (מזומן)</div>
              <div style={{fontWeight:700,fontSize:15}}>{fmt(totalTaanit)} ₪</div>
            </div>
          )}
          {totalRounding>0&&(
            <div style={{background:"rgba(255,255,255,.13)",borderRadius:8,padding:"6px 10px",gridColumn:"1/-1"}}>
              <div style={{fontSize:10,opacity:.75}}>⭕ עיגול סריקוב החודש</div>
              <div style={{fontWeight:700,fontSize:15}}>{fmt(totalRounding)} ₪</div>
            </div>
          )}
        </div>
      </div>

      {/* ── כרטיס אברכים שצריכים להחזיר ── */}
      {owingList.length>0&&(
        <div style={{...card,background:allOwingPaid?"#f0fdf4":"#fef2f2",border:`2px solid ${allOwingPaid?"#16a34a":"#f87171"}`}}>
          <div style={{fontWeight:700,fontSize:14,color:allOwingPaid?"#166534":"#dc2626",marginBottom:8}}>
            {allOwingPaid?"✅ כל ההחזרים התקבלו":"⚠️ אברכים שצריכים להחזיר"}
            <span style={{fontSize:11,fontWeight:400,marginRight:6,color:"#64748b"}}>
              ({owingPaidCount}/{owingList.length} התקבלו — {fmt(totalOwing)} ₪ סה״כ)
            </span>
          </div>
          {owingList.map(({av,c})=>{
            const received = getAV(selKey,av.id,"refundReceived")==="1";
            const refundRaw = getAV(selKey,av.id,"refundActual");
            const refundActual = refundRaw!==""?Number(refundRaw):null;
            const owed = Math.abs(c.totalToBank);
            const carryover = refundActual!==null ? refundActual - owed : null;

            const onRefundChange = v => {
              setAvMonthField(selKey,av.id,"refundActual",v);
              if(v!=="") setAvMonthField(selKey,av.id,"refundCarryover", Number(v)-owed);
              else        setAvMonthField(selKey,av.id,"refundCarryover","");
            };

            return (
              <div key={av.id} style={{borderRadius:8,marginBottom:4,overflow:"hidden",
                border:`1px solid ${received?"#86efac":"#fecaca"}`,
                background:received?"#dcfce7":"#fff",transition:"all .2s"}}>

                {/* שורה ראשית */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"7px 10px",opacity:received?0.65:1,gap:8}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:14}}>{av.name}</span>
                    {received&&<span style={{fontSize:11,color:"#16a34a",marginRight:6,fontWeight:600}}> ✓ התקבל</span>}
                    {c.prevRefundCarryover!==0&&<div style={{fontSize:10,fontWeight:700,
                      color:c.prevRefundCarryover>0?"#16a34a":"#dc2626"}}>
                      פ׳קודם: {c.prevRefundCarryover>0?"+":""}{fmt(c.prevRefundCarryover)} ₪
                    </div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:800,fontSize:16,color:"#dc2626"}}>{fmt(owed)} ₪</span>
                    <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",
                      background:received?"#16a34a":"#f1f5f9",border:`2px solid ${received?"#16a34a":"#cbd5e1"}`,
                      borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600,
                      color:received?"#fff":"#64748b",transition:"all .2s",userSelect:"none"}}>
                      <input type="checkbox"
                        checked={received}
                        onChange={e=>setAvMonthField(selKey,av.id,"refundReceived",e.target.checked?"1":"")}
                        style={{width:15,height:15,cursor:"pointer",accentColor:"#16a34a"}}/>
                      התקבל
                    </label>
                  </div>
                </div>

                {/* שדה סכום שהתקבל */}
                {!received&&(
                  <div style={{borderTop:"1px solid #fecaca",padding:"7px 10px",
                    background:"rgba(254,202,202,.1)",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:110}}>
                      <div style={{fontSize:11,color:"#475569",fontWeight:600,marginBottom:3}}>💰 התקבל בפועל (₪)</div>
                      <input type="number"
                        style={{border:`2px solid ${refundActual!==null?"#f59e0b":"#cbd5e1"}`,
                          borderRadius:7,padding:"5px 8px",fontSize:14,width:"100%",
                          boxSizing:"border-box",textAlign:"left",background:"#fff"}}
                        value={refundRaw}
                        placeholder={String(owed)}
                        onChange={e=>onRefundChange(e.target.value)}
                      />
                    </div>
                    {carryover!==null&&(
                      carryover===0
                        ? <div style={{fontSize:13,color:"#16a34a",fontWeight:800}}>✅ מאוזן</div>
                        : <div style={{textAlign:"center",borderRadius:8,padding:"4px 10px",
                            background:carryover>0?"#f0fdf4":"#fef2f2",
                            border:`1.5px solid ${carryover>0?"#86efac":"#f87171"}`}}>
                            <div style={{fontSize:10,color:"#64748b"}}>עובר לחודש הבא</div>
                            <div style={{fontSize:14,fontWeight:800,color:carryover>0?"#16a34a":"#dc2626"}}>
                              {carryover>0?"זכות +":"חוב "}{fmt(Math.abs(carryover))} ₪
                            </div>
                          </div>
                    )}
                  </div>
                )}

                {/* כשסגור — תקציר */}
                {received&&refundActual!==null&&(
                  <div style={{borderTop:"1px solid #86efac",padding:"4px 10px",
                    background:"rgba(134,239,172,.12)",fontSize:11,color:"#166534",display:"flex",gap:8}}>
                    <span>התקבל: <b>{fmt(refundActual)} ₪</b></span>
                    {carryover!==null&&carryover!==0&&<span style={{fontWeight:700,
                      color:carryover>0?"#16a34a":"#dc2626"}}>
                      | {carryover>0?"זכות +":"חוב "}{fmt(Math.abs(carryover))} ₪ לחודש הבא
                    </span>}
                    {carryover===0&&<span>| ✓ מאוזן</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── כרטיס מזומן ── */}
      {cashList.length>0&&(
        <div style={{...card,background:allCashPaid?"#f0fdf4":"#fefce8",border:`2px solid ${allCashPaid?"#16a34a":"#fbbf24"}`}}>
          <div style={{fontWeight:700,fontSize:14,color:allCashPaid?"#166534":"#92400e",marginBottom:8}}>
            {allCashPaid?"✅ כל המזומן שולם":"💵 תשלומי מזומן"}
            <span style={{fontSize:11,fontWeight:400,marginRight:6,color:"#64748b"}}>
              ({cashPaidCount}/{cashList.length} שולמו — {fmt(cashPaidTotal)} ₪)
            </span>
          </div>
          {cashList.map(({av,c})=>{
            const paid = getAV(selKey,av.id,"cashPaid")==="1";
            return (
              <div key={av.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"7px 8px",borderRadius:8,marginBottom:4,
                background:paid?"#dcfce7":"#fff",border:`1px solid ${paid?"#86efac":"#e2e8f0"}`,
                opacity:paid?.65:1,transition:"all .2s"}}>
                <div>
                  <span style={{fontWeight:700,fontSize:14}}>{av.name}</span>
                  {paid&&<span style={{fontSize:11,color:"#16a34a",marginRight:6,fontWeight:600}}> ✓ שולם</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:800,fontSize:16,color:"#b45309"}}>{fmt(c.cashAmount)} ₪</span>
                  <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",
                    background:paid?"#16a34a":"#f1f5f9",border:`2px solid ${paid?"#16a34a":"#cbd5e1"}`,
                    borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600,
                    color:paid?"#fff":"#64748b",transition:"all .2s",userSelect:"none"}}>
                    <input type="checkbox"
                      checked={paid}
                      onChange={e=>setAvMonthField(selKey,av.id,"cashPaid",e.target.checked?"1":"")}
                      style={{width:15,height:15,cursor:"pointer",accentColor:"#16a34a"}}/>
                    שולם
                  </label>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── כרטיס תענית דיבור ── */}
      {taanitList.length>0&&(
        <div style={{...card,background:allTaanitPaid?"#f0f9ff":"#e0f2fe",border:`2px solid ${allTaanitPaid?"#0369a1":"#7dd3fc"}`}}>
          <div style={{fontWeight:700,fontSize:14,color:allTaanitPaid?"#075985":"#0369a1",marginBottom:8}}>
            {allTaanitPaid?"✅ כל תענית דיבור שולמה":"🤫 תענית דיבור — מזומן"}
            <span style={{fontSize:11,fontWeight:400,marginRight:6,color:"#64748b"}}>
              ({taanitPaidCount}/{taanitList.length} שולמו — {fmt(taanitPaidTotal)} ₪)
            </span>
          </div>
          {taanitList.map(({av,c})=>{
            const paid = getAV(selKey,av.id,"taanitPaid")==="1";
            const combined = c.taanitAmount + c.cashAmount;
            return (
              <div key={av.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"7px 8px",borderRadius:8,marginBottom:4,
                background:paid?"#dbeafe":"#fff",border:`1px solid ${paid?"#93c5fd":"#e2e8f0"}`,
                opacity:paid?.65:1,transition:"all .2s"}}>
                <div>
                  <span style={{fontWeight:700,fontSize:14}}>{av.name}</span>
                  {paid&&<span style={{fontSize:11,color:"#0369a1",marginRight:6,fontWeight:600}}> ✓ קיבל</span>}
                  <div style={{fontSize:11,color:"#64748b"}}>
                    {c.taanitDays} ימים × 15 ₪{c.cashAmount>0&&` + ${fmt(c.cashAmount)} ₪ מזומן`}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:800,fontSize:16,color:"#0369a1"}}>{fmt(combined)} ₪</span>
                  <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",
                    background:paid?"#0369a1":"#f1f5f9",border:`2px solid ${paid?"#0369a1":"#cbd5e1"}`,
                    borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600,
                    color:paid?"#fff":"#64748b",transition:"all .2s",userSelect:"none"}}>
                    <input type="checkbox"
                      checked={paid}
                      onChange={e=>{const v=e.target.checked?"1":""; setAvMonthField(selKey,av.id,"taanitPaid",v); if(c.cashAmount>0) setAvMonthField(selKey,av.id,"cashPaid",v);}}
                      style={{width:15,height:15,cursor:"pointer",accentColor:"#0369a1"}}/>
                    {paid?"שולם":"סמן"}
                  </label>
                </div>
              </div>
            );
          })}
          <div style={{marginTop:8,paddingTop:6,borderTop:"1px solid #bae6fd",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#0369a1"}}>סה״כ תענית דיבור</span>
            <span style={{fontSize:15,fontWeight:800,color:"#0369a1"}}>{fmt(totalTaanit)} ₪</span>
          </div>
        </div>
      )}

      {/* ── כרטיס העברות בנק ── */}
      {totalCount>0&&(
        <div style={{...card,background:allSent?"#f0fdf4":"#fffbeb",border:`2px solid ${allSent?"#16a34a":"#f59e0b"}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:allSent?"#166534":"#92400e",marginBottom:6}}>
                {allSent?"✅ כל הדרישות נשלחו":"🏦 העברות לבנק"}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12}}>
                <div style={{background:allSent?"#dcfce7":"#fef9c3",borderRadius:7,padding:"3px 10px"}}>
                  <span style={{color:"#64748b"}}>נשלחו </span>
                  <span style={{fontWeight:700,color:allSent?"#166534":"#92400e"}}>{sentCount}/{totalCount}</span>
                </div>
                {sentTotal>0&&<div style={{background:"#dcfce7",borderRadius:7,padding:"3px 10px"}}>
                  <span style={{color:"#64748b"}}>הועבר </span>
                  <span style={{fontWeight:700,color:"#166534"}}>{fmt(sentTotal)} ₪</span>
                </div>}
                {pendingBank>0&&<div style={{background:"#fef9c3",borderRadius:7,padding:"3px 10px"}}>
                  <span style={{color:"#64748b"}}>ממתין </span>
                  <span style={{fontWeight:700,color:"#b45309"}}>{fmt(pendingBank)} ₪</span>
                </div>}
              </div>
            </div>
            <button onClick={()=>setExpanded(v=>!v)}
              style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"6px 14px",
                fontSize:12,fontWeight:600,cursor:"pointer",color:"#374151",whiteSpace:"nowrap"}}>
              {expanded?"▲ כווץ":"▼ הרחב"}
            </button>
          </div>
        </div>
      )}

      {/* ── רשימת אברכים (מוצגת רק כשמורחב) ── */}
      {expanded && deposits.length===0 &&
        <div style={{...card,color:"#94a3b8",textAlign:"center"}}>אין נתוני הפקדה לחודש זה</div>}
      {expanded && deposits.map(({av,c})=>(
        <div key={av.id} style={{...card,borderRight:`4px solid ${trackColor[av.track]||"#64748b"}`,opacity:getAV(selKey,av.id,"bankRequested")==="1"?0.6:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:700,fontSize:15}}>{av.name}</span>
                {getAV(selKey,av.id,"bankRequested")==="1"&&
                  <span style={{fontSize:11,background:"#dcfce7",color:"#166534",borderRadius:10,padding:"2px 8px",fontWeight:600}}>✓ נשלחה דרישה</span>}
              </div>
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",fontSize:12,color:"#64748b"}}>
                <span>בסיס: {fmt(c.effectiveBank)} ₪</span>
                {c.holiday>0&&<span style={{color:"#b45309",fontWeight:600}}>+ חג: {fmt(c.holiday)} ₪</span>}
                {c.depositRounding>0&&<span style={{color:"#7c3aed",fontWeight:600}}>+ עיגול: {fmt(c.depositRounding)} ₪</span>}
              </div>
              {c.cashAmount>0&&(
                <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
                  <div style={{background:"#eff6ff",borderRadius:8,padding:"4px 10px",fontSize:12}}>
                    <span style={{color:"#64748b"}}>🏦 בנק: </span>
                    <span style={{fontWeight:700,color:"#0369a1"}}>{fmt(c.bankDeposit)} ₪</span>
                  </div>
                  <div style={{background:"#fefce8",borderRadius:8,padding:"4px 10px",fontSize:12}}>
                    <span style={{color:"#64748b"}}>💵 מזומן: </span>
                    <span style={{fontWeight:700,color:"#b45309"}}>{fmt(c.cashAmount)} ₪</span>
                  </div>
                </div>
              )}
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <div style={{fontWeight:800,fontSize:20,color:"#059669"}}>{fmt(c.totalToBank)} ₪</div>
              {c.actualBank!=null&&(
                <div style={{fontSize:11,color:c.bankGap===0?"#16a34a":c.bankGap>0?"#dc2626":"#2563eb",fontWeight:600}}>
                  {c.bankGap===0?"✓ שולם":c.bankGap>0?`חסר ${fmt(c.bankGap)} ₪`:`עודף ${fmt(Math.abs(c.bankGap))} ₪`}
                </div>
              )}
              {c.totalToBank>0 && (
                c.cashAmount>=c.totalToBank ? (
                  <button onClick={()=>{setAvMonthField(selKey,av.id,"bankDeposit","");setAvMonthField(selKey,av.id,"bankRequested","");}}
                    style={{background:"#fefce8",border:"1.5px solid #fbbf24",borderRadius:8,padding:"4px 10px",
                      fontSize:12,fontWeight:600,cursor:"pointer",color:"#92400e"}}>
                    ↩ העבר לבנק
                  </button>
                ) : (
                  <button onClick={()=>{setAvMonthField(selKey,av.id,"bankDeposit","0");setAvMonthField(selKey,av.id,"bankRequested","1");}}
                    style={{background:"#eff6ff",border:"1.5px solid #93c5fd",borderRadius:8,padding:"4px 10px",
                      fontSize:12,fontWeight:600,cursor:"pointer",color:"#1d4ed8"}}>
                    💵 העבר למזומן
                  </button>
                )
              )}
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",userSelect:"none",
                background:getAV(selKey,av.id,"bankRequested")==="1"?"#dcfce7":"#f1f5f9",
                border:`2px solid ${getAV(selKey,av.id,"bankRequested")==="1"?"#16a34a":"#cbd5e1"}`,
                borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,
                color:getAV(selKey,av.id,"bankRequested")==="1"?"#166534":"#64748b",
                transition:"all .2s"}}>
                <input type="checkbox"
                  checked={getAV(selKey,av.id,"bankRequested")==="1"}
                  onChange={e=>setAvMonthField(selKey,av.id,"bankRequested",e.target.checked?"1":"")}
                  style={{width:16,height:16,cursor:"pointer",accentColor:"#16a34a"}}/>
                נשלחה דרישה
              </label>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ATTENDANCE TAB ───────────────────────────────────────────
function AttendanceTab({ avrechim, selKey, selYear, selMonth, attendance, setAttendanceDay, fillMonthBatch, customVacations, setCustomVacation, removeCustomVacation, beinHazmanims, addBeinHazmanim, removeBeinHazmanim, updateBeinHazmanim, hiddenHols, toggleHolidayHidden }) {
  const [settingsModal,setSettingsModal]= useState(false);
  const [shareModal,  setShareModal]   = useState(false);
  const [viewMode,    setViewMode]     = useState("grid");
  const [hebYear,     setHebYear]      = useState(_curHebYear);
  const [hebMonth,    setHebMonth]     = useState("ניסן");
  const [hebDay,      setHebDay]       = useState(1);
  const [newVacLabel, setNewVacLabel]  = useState("");
  const [vacEveryYear,setVacEveryYear] = useState(false);
  const [bhEveryYear, setBhEveryYear]  = useState(false);
  const [newBh,       setNewBh]        = useState({yearFrom:_curHebYear,monthFrom:"תשרי",dayFrom:1,yearTo:_curHebYear,monthTo:"תשרי",dayTo:29,label:""});
  const [editBhIdx,   setEditBhIdx]    = useState(null);
  const [editBhData,  setEditBhData]   = useState({from:"",to:"",label:""});
  const [tooltip,     setTooltip]      = useState(null);

  const activeAvrechim = avrechim.filter(a=>a.active);
  const weeks = getMonthWeeks(selYear, selMonth);

  const getAtt = (avId,dateStr) => attendance[selKey]?.[String(avId)]?.[dateStr];

  const isPresent = (avId,dateStr,dt) => {
    const val=getAtt(avId,dateStr);
    if(val!==undefined) return val==="1";
    return dt.type==="learning";
  };

  const toggleAtt = (avId,dateStr,dt) => {
    setAttendanceDay(selKey,avId,dateStr,isPresent(avId,dateStr,dt)?"0":"1");
  };

  const calcSummary = (av) => {
    let present=0,total=0;
    weeks.forEach(week=>week.forEach(day=>{
      if(!day.inMonth) return;
      const dt=getDayType(day.dateStr,customVacations,beinHazmanims,hiddenHols);
      if(dt.type!=="learning") return;
      total++;
      if(isPresent(av.id,day.dateStr,dt)) present++;
    }));
    return { present, total, pct:total>0?Math.round(present/total*100):0 };
  };

  const generateMessage = () => {
    const label=mkMonthLabel(selYear,selMonth);
    const totalDays=weeks.reduce((s,w)=>s+w.filter(d=>d.inMonth&&getDayType(d.dateStr,customVacations,beinHazmanims,hiddenHols).type==="learning").length,0);
    let lines=[`📋 נוכחות אברכים — ${label}`,`סה״כ ימי לימוד: ${totalDays}\n`];
    activeAvrechim.forEach(av=>{
      const {present,total,pct}=calcSummary(av);
      lines.push(`${av.name}: ${present}/${total} (${pct}%)`);
    });
    return lines.join("\n");
  };

  const monthVacDates=Object.entries(customVacations||{}).filter(([d])=>d.startsWith(selKey));
  const DAY_NAMES_HE=["א׳","ב׳","ג׳","ד׳","ה׳"];
  const offBg={ bein_hazmanim:"#f1f5f9", holiday:"#fefce8", vacation:"#fff0f0", friday:"#f8fafc", shabbat:"#f8fafc" };

  return (
    <div style={col}>
      {tooltip&&(
        <div style={{position:"fixed",left:tooltip.x,top:tooltip.y-6,transform:"translate(-50%,-100%)",
          background:"rgba(30,41,59,0.95)",color:"#fff",borderRadius:7,padding:"4px 10px",
          fontSize:12,fontWeight:600,pointerEvents:"none",zIndex:2000,whiteSpace:"nowrap",
          boxShadow:"0 2px 8px rgba(0,0,0,0.25)"}}>
          {tooltip.text}
        </div>
      )}
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#064e3b,#059669)",borderRadius:12,padding:"14px 16px",color:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:13,opacity:.8,marginBottom:6}}>📋 נוכחות — {mkMonthLabel(selYear,selMonth)}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <button style={{padding:"5px 12px",borderRadius:8,background:"#fff",color:"#064e3b",border:"none",cursor:"pointer",fontWeight:700,fontSize:12}}
            onClick={()=>fillMonthBatch(selKey,activeAvrechim,weeks,customVacations)}>✅ מלא חודש</button>
          <button style={{padding:"5px 12px",borderRadius:8,background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",cursor:"pointer",fontWeight:600,fontSize:12}}
            onClick={()=>setSettingsModal(true)}>⚙️ הגדרות חופשות</button>
          <button style={{padding:"5px 12px",borderRadius:8,background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",cursor:"pointer",fontWeight:600,fontSize:12}}
            onClick={()=>setShareModal(true)}>📤 שלח לסריקוב</button>
          <div style={{marginRight:"auto",display:"flex",gap:3}}>
            {["grid","summary"].map(m=>(
              <button key={m} onClick={()=>setViewMode(m)}
                style={{padding:"3px 9px",borderRadius:6,background:viewMode===m?"#fff":"rgba(255,255,255,.18)",color:viewMode===m?"#064e3b":"#fff",border:"none",cursor:"pointer",fontSize:11,fontWeight:700}}>
                {m==="grid"?"גריד":"סיכום"}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {[["#22c55e","נוכח","#f0fdf4"],["#ef4444","נעדר","#fef2f2"],["#f59e0b","חג","#fefce8"],["#94a3b8","בין הזמנים","#f1f5f9"],["#fca5a5","חופשה","#fff0f0"]].map(([c,l,bg])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:3,background:bg,borderRadius:20,padding:"2px 8px",border:`1px solid ${c}`,fontSize:10,color:"#475569"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:c}}/>{l}
          </div>
        ))}
      </div>

      {/* Custom vacations */}
      {monthVacDates.length>0&&(
        <div style={{...card,background:"#fff0f0",border:"1.5px solid #fca5a5",padding:"8px 12px"}}>
          <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:4}}>🏖️ חופשות יישוב — {mkMonthLabel(selYear,selMonth)}</div>
          {monthVacDates.map(([d,label])=>(
            <div key={d} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"2px 0"}}>
              <span style={{color:"#475569"}}>{d.slice(8)}/{selMonth+1} — {label}</span>
              <button style={delBtn} onClick={()=>removeCustomVacation(d)}>✕</button>
            </div>
          ))}
        </div>
      )}

      {/* GRID VIEW */}
      {viewMode==="grid" && weeks.map((week,wi)=>{
        const dayTypes=week.map(d=>getDayType(d.dateStr,customVacations,beinHazmanims,hiddenHols));
        const first=week.find(d=>d.inMonth);
        const last=[...week].reverse().find(d=>d.inMonth);
        if(!first) return null;
        return (
          <div key={wi} style={{...card,padding:"8px 10px",overflowX:"auto"}}>
            <div style={{fontWeight:700,fontSize:11,color:"#64748b",marginBottom:5,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span>שבוע {wi+1} &nbsp;•&nbsp; {first.dayNum}–{last.dayNum}/{selMonth+1}</span>
              <span style={{fontSize:10,color:"#7c3aed",background:"#f5f3ff",borderRadius:10,padding:"1px 7px",fontWeight:600}}>
                {toHebrewMonth(first.dateStr)}
              </span>
            </div>
            {/* Day headers */}
            <div style={{display:"grid",gridTemplateColumns:"130px repeat(5,1fr)",gap:2,marginBottom:3}}>
              <div/>
              {week.map((day,di)=>{
                const dt=dayTypes[di];
                const isOff=dt.type!=="learning";
                return (
                  <div key={di} style={{textAlign:"center",borderRadius:6,padding:"3px 1px",fontSize:10,
                    background:isOff?(offBg[dt.type]||"#f1f5f9"):"#f0fdf4",
                    border:`1px solid ${isOff?"#e2e8f0":"#86efac"}`,
                    color:day.inMonth?"#374151":"#d1d5db"}}>
                    <div style={{fontWeight:700}}>{DAY_NAMES_HE[di]}</div>

                              onChange={e=>setEditBhData(d=>({...d,from:e.target.value}))}/>

                            <input type="date" style={{...inp,flex:1,fontSize:12,padding:"5px 8px"}} value={editBhData.to}

                                updateBeinHazmanim(i,{from:editBhData.from,to:editBhData.to,label:editBhData.label.trim()});

                            <button style={{...grayBtn,flex:1,fontSize:12}} onClick={()=>setEditBhIdx(null)}>ביטול</button>
                          </div>

                        {toFullHebDate(gf)} — {toFullHebDate(gt)}&nbsp;&nbsp;

                      setNewBh({yearFrom:_curHebYear,monthFrom:"תשרי",dayFrom:1,yearTo:_curHebYear,monthTo:"תשרי",dayTo:29,label:""});

                        <button style={{fontSize:10,padding:"2px 9px",borderRadius:6,cursor:"pointer",fontWeight:700,border:"none",
                          background:hidden?"#dcfce7":"#fee2e2",color:hidden?"#16a34a":"#dc2626"}}
                          onClick={()=>toggleHolidayHidden(h.label)}>
                          {hidden?"הצג":"הסתר"}
                        </button>
                      </div>
                    );
                  })}
                </div>

              </div>
            </div>
          </div>
        );
      })()}

      {/* Share modal */}
      {shareModal&&(
        <Modal title="📤 שליחה לסריקוב" onClose={()=>setShareModal(false)}>
          <div style={{background:"#f8fafc",borderRadius:8,padding:10,fontSize:12,whiteSpace:"pre-line",marginBottom:12,maxHeight:220,overflowY:"auto",fontFamily:"monospace",border:"1px solid #e2e8f0",lineHeight:1.9,direction:"rtl"}}>
            {generateMessage()}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{flex:1,padding:"10px",background:"#25d366",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}
              onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(generateMessage())}`,"_blank")}>
              📱 וואטסאפ
            </button>
            <button style={{flex:1,padding:"10px",background:"#2563eb",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}
              onClick={()=>{ window.location.href=`mailto:anat@bazzjeans.co.il,m0509766686@gmail.com?subject=${encodeURIComponent("נוכחות "+mkMonthLabel(selYear,selMonth))}&body=${encodeURIComponent(generateMessage())}`; }}>
              📧 מייל
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Chip({label,val,pos,neg}){
  const bg=pos?"rgba(34,197,94,0.22)":neg?"rgba(239,68,68,0.22)":"rgba(255,255,255,0.14)";
  return <div style={{background:bg,borderRadius:8,padding:"4px 10px",fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
    <span style={{opacity:.7,fontSize:10}}>{label}</span><span style={{fontWeight:700}}>{val}</span>
  </div>;
}
function BalanceConfirm({draft,confirmed,prevConfirmed,onConfirm,onUndo}){
  const d=Number(draft)||0, c=Number(confirmed)||0;
  const diff=d-c;
  const hasPrev = prevConfirmed!==null && prevConfirmed!==undefined;
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:5,marginTop:4,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:diff!==0?"#dc2626":"#16a34a",whiteSpace:"nowrap"}}>
        {diff!==0 ? `ממתין ליתרה: ${fmtSigned(diff)} ₪` : "✓ מעודכן ביתרה"}
      </span>
      <div style={{display:"flex",gap:5}}>
        {hasPrev && <button style={{...smallBtn,whiteSpace:"nowrap",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"}} onClick={onUndo}>↩ בטל</button>}
        <button style={{...smallBtn,whiteSpace:"nowrap",opacity:diff===0?0.5:1}} disabled={diff===0} onClick={onConfirm}>+ הוסף לסכום</button>
      </div>
    </div>
  );
}

}
function AvF({label,val,onChange,placeholder,hi}){
